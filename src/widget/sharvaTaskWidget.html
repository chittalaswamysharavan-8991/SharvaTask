<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SharvaTask</title>
  <style>
    :root {
      color-scheme: light;
      --glass: rgba(255, 252, 247, 0.74);
      --glass-strong: rgba(255, 252, 247, 0.88);
      --glass-soft: rgba(255, 255, 255, 0.54);
      --glass-tint: rgba(245, 239, 231, 0.60);
      --paper: rgba(255, 255, 255, 0.84);
      --paper-soft: rgba(255, 255, 255, 0.60);
      --ink: #1c1b1a;
      --ink-2: #423f3c;
      --muted: #736d67;
      --line: rgba(183, 171, 157, 0.28);
      --line-strong: rgba(171, 158, 143, 0.36);
      --brand: #8b5cf6;
      --brand-2: #7445ec;
      --brand-soft: rgba(140, 92, 246, 0.14);
      --ok: #14814b;
      --ok-soft: rgba(20, 129, 75, 0.10);
      --warn: #b56a10;
      --warn-soft: rgba(235, 170, 72, 0.16);
      --danger: #c2413d;
      --danger-soft: rgba(194, 65, 61, 0.12);
      --shadow: 0 18px 48px rgba(15, 16, 20, 0.10), 0 2px 8px rgba(15, 16, 20, 0.05);
      --radius-xl: 28px;
      --radius-lg: 20px;
      --radius-md: 16px;
      --radius-pill: 999px;
      --gap: 14px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: transparent;
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }

    .shell {
      width: min(920px, 100%);
      margin: 0 auto;
      padding: 18px;
    }

    .card {
      background: linear-gradient(180deg, var(--glass-strong), var(--glass));
      border: 1px solid rgba(255,255,255,0.52);
      border-radius: var(--radius-xl);
      overflow: hidden;
      box-shadow: var(--shadow);
      backdrop-filter: blur(24px) saturate(1.2);
      -webkit-backdrop-filter: blur(24px) saturate(1.2);
      position: relative;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0 0 auto 0;
      height: 34%;
      background: linear-gradient(180deg, rgba(255,255,255,0.34), rgba(255,255,255,0));
      pointer-events: none;
    }

    .header {
      padding: 22px 22px 18px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,0.32), rgba(255,255,255,0.14));
      position: relative;
      z-index: 1;
    }

    .header-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
    }

    .eyebrow {
      color: var(--brand-2);
      font-weight: 900;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .12em;
      margin-bottom: 6px;
    }

    h1 {
      color: var(--ink);
      font-size: 24px;
      line-height: 1.12;
      letter-spacing: -0.03em;
      margin: 0;
    }

    .sub {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
      max-width: 56ch;
      margin-top: 8px;
    }

    .meta-line {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 14px;
      color: var(--ink-2);
      font-size: 12px;
      margin-top: 12px;
    }

    .meta-line strong { color: var(--ink); }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
      align-items: center;
      flex-shrink: 0;
    }

    button, input, select {
      font: inherit;
    }

    button {
      border: 1px solid rgba(255,255,255,0.60);
      background: rgba(255,255,255,0.62);
      color: var(--ink);
      border-radius: var(--radius-pill);
      padding: 9px 13px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      transition: transform .14s ease, border-color .14s ease, background .14s ease, box-shadow .14s ease, opacity .14s ease;
      box-shadow: 0 6px 16px rgba(15,16,20,0.05);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    button:hover:not(:disabled) {
      border-color: rgba(139,92,246,0.42);
      background: rgba(255,255,255,0.78);
      box-shadow: 0 10px 22px rgba(124, 58, 237, 0.10);
      transform: translateY(-1px);
    }

    button.primary {
      background: linear-gradient(180deg, #9c74ff, #8b5cf6);
      border-color: rgba(139,92,246,0.45);
      color: white;
      box-shadow: 0 10px 20px rgba(139,92,246,0.22);
    }

    button.ghost { background: rgba(255,255,255,.50); }
    button.danger { color: var(--danger); background: rgba(255,240,238,0.55); border-color: rgba(194,65,61,0.20); }
    button.small { padding: 7px 11px; font-size: 12px; }
    button:disabled { opacity: .55; cursor: not-allowed; transform: none; box-shadow: none; }

    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    .stat {
      background: rgba(255,255,255,0.44);
      border: 1px solid rgba(255,255,255,0.54);
      border-radius: 16px;
      padding: 10px 14px;
      min-width: 120px;
      flex: 1 1 0;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.35);
      backdrop-filter: blur(10px);
    }

    .stat-num {
      font-size: 20px;
      font-weight: 850;
      color: var(--ink);
      line-height: 1;
      display: inline;
      margin-right: 6px;
    }

    .stat-label {
      color: var(--muted);
      font-size: 12px;
      margin-top: 0;
      font-weight: 700;
      display: inline;
    }

    .body { padding: 18px 22px 22px; position: relative; z-index: 1; }

    .composer {
      background: rgba(255,255,255,.34);
      border: 1px solid rgba(255,255,255,0.48);
      border-radius: 22px;
      padding: 10px;
      margin-bottom: 18px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.35);
      backdrop-filter: blur(10px);
    }

    .add-row {
      display: grid;
      grid-template-columns: 1fr 88px auto;
      gap: 10px;
      align-items: center;
    }

    input, select {
      border: 1px solid rgba(255,255,255,0.58);
      background: rgba(255,255,255,0.68);
      color: var(--ink);
      border-radius: var(--radius-pill);
      padding: 12px 14px;
      min-width: 0;
      outline: none;
      font-size: 14px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    input:focus, select:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 4px rgba(124,58,237,.12);
    }

    input::placeholder { color: #9b9287; }

    .sections { display: flex; flex-direction: column; gap: 14px; }

    .section {
      background: rgba(255,255,255,.24);
      border: 1px solid rgba(255,255,255,0.38);
      border-radius: 22px;
      overflow: hidden;
      backdrop-filter: blur(10px);
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      color: var(--ink-2);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: -0.01em;
      background: rgba(255,255,255,.22);
      border-bottom: 1px solid var(--line);
    }

    .section-count {
      color: var(--muted);
      background: rgba(255,255,255,0.54);
      border: 1px solid rgba(255,255,255,0.60);
      border-radius: var(--radius-pill);
      padding: 4px 8px;
      font-size: 12px;
    }

    .task-list { display: flex; flex-direction: column; gap: 10px; padding: 12px; }

    .task {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 12px;
      align-items: flex-start;
      padding: 14px;
      border: 1px solid rgba(255,255,255,0.58);
      border-radius: 20px;
      background: rgba(255,255,255,0.70);
      box-shadow: 0 10px 26px rgba(21, 24, 28, 0.06);
      backdrop-filter: blur(12px);
    }

    .task.blocked { background: linear-gradient(180deg, rgba(255,249,238,0.82), rgba(255,246,229,0.72)); border-color: rgba(235, 192, 120, 0.38); }
    .task.done { background: rgba(250,250,248,0.62); opacity: .82; }

    .check {
      width: 28px;
      height: 28px;
      border-radius: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255,255,255,0.62);
      background: rgba(255,255,255,0.56);
      color: var(--brand);
      font-weight: 950;
      padding: 0;
      flex-shrink: 0;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.35);
    }

    .check.done { background: var(--ok-soft); color: var(--ok); border-color: #b7e4c3; }

    .task-title {
      color: var(--ink);
      font-weight: 850;
      font-size: 15px;
      line-height: 1.35;
      letter-spacing: -0.01em;
    }

    .task-title.done { text-decoration: line-through; color: var(--muted); }

    .task-sub {
      color: var(--muted);
      font-size: 12px;
      margin-top: 6px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      padding: 4px 8px;
      border-radius: var(--radius-pill);
      background: rgba(255,255,255,0.52);
      border: 1px solid rgba(255,255,255,0.56);
      color: var(--muted);
      font-weight: 720;
      white-space: nowrap;
    }

    .tag.status-pending, .tag.status-in_progress { color: var(--brand-2); background: var(--brand-soft); border-color: #ddccff; }
    .tag.status-blocked { color: var(--warn); background: var(--warn-soft); border-color: #f0d8a8; }
    .tag.status-done, .tag.status-verified { color: var(--ok); background: var(--ok-soft); border-color: #b7e4c3; }
    .tag.status-dropped { color: var(--danger); background: var(--danger-soft); border-color: #ffd1cb; }

    .notes {
      color: var(--muted);
      font-size: 12px;
      margin-top: 8px;
      line-height: 1.42;
    }

    .details {
      margin-top: 8px;
      color: var(--muted);
      font-size: 11px;
    }

    .details summary {
      cursor: pointer;
      color: var(--brand-2);
      font-weight: 800;
    }

    .details code {
      display: inline-block;
      margin-top: 5px;
      background: var(--paper-soft);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 4px 6px;
      color: var(--ink-2);
    }

    .task-actions {
      display: flex;
      gap: 7px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .list-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 12px;
    }

    .list-card {
      border: 1px solid rgba(255,255,255,0.56);
      background: rgba(255,255,255,0.62);
      border-radius: 22px;
      padding: 16px;
      box-shadow: 0 10px 24px rgba(21, 24, 28, 0.06);
      backdrop-filter: blur(12px);
    }

    .list-title {
      color: var(--ink);
      font-size: 16px;
      font-weight: 900;
      line-height: 1.25;
      margin-bottom: 7px;
      letter-spacing: -0.02em;
    }

    .list-meta {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      margin-bottom: 11px;
    }

    .list-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 7px;
      margin-bottom: 12px;
    }

    .mini-stat {
      background: rgba(255,255,255,0.44);
      border: 1px solid rgba(255,255,255,0.54);
      border-radius: 14px;
      padding: 8px;
      text-align: center;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.35);
    }

    .mini-stat strong { display: block; color: var(--ink); font-size: 16px; line-height: 1; }
    .mini-stat span { display: block; color: var(--muted); font-size: 10px; margin-top: 4px; font-weight: 750; }

    .history { display: flex; flex-direction: column; gap: 10px; }
    .event { border: 1px solid rgba(255,255,255,0.56); border-radius: 20px; padding: 13px; background: rgba(255,255,255,0.62); backdrop-filter: blur(12px); }
    .event-action { font-weight: 900; color: var(--ink); }
    .event-json { color: var(--muted); font-size: 11px; margin-top: 8px; white-space: pre-wrap; word-break: break-word; background: var(--paper-soft); border: 1px solid var(--line); border-radius: 12px; padding: 10px; }

    .empty {
      color: var(--muted);
      padding: 26px 18px;
      text-align: center;
      border: 1px dashed rgba(171, 158, 143, 0.34);
      border-radius: 20px;
      background: rgba(255,255,255,.30);
      line-height: 1.45;
      backdrop-filter: blur(10px);
    }

    .empty strong { color: var(--ink); display: block; margin-bottom: 4px; }

    .toast {
      margin-top: 12px;
      color: var(--muted);
      font-size: 12px;
      min-height: 18px;
      font-weight: 700;
    }

    .toast.busy { color: var(--brand-2); }
    .toast.error { color: var(--danger); }

    @media (max-width: 640px) {
      .shell { padding: 6px; width: 100%; }
      .card { border-radius: 20px; }
      .header { padding: 14px 14px 12px; }
      .header-top { display: block; padding-right: 106px; }
      .actions { position: absolute; top: 10px; right: 10px; gap: 4px; }
      .actions button.small.icon-action { width: 31px; height: 31px; padding: 0; display: inline-flex; align-items:center; justify-content:center; }
      .actions .btn-text { display: none; }
      .btn-icon { display: inline; font-size: 14px; line-height: 1; }
      .eyebrow { font-size: 9px; letter-spacing: .14em; margin-bottom: 5px; }
      h1 { font-size: 20px; line-height: 1.1; }
      .sub {
        font-size: 12px;
        margin-top: 6px;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .meta-line { font-size: 11px; gap: 3px 8px; margin-top: 8px; }
      .meta-line strong { display: none; }

      .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-top: 12px; }
      .stat { min-width: 0; padding: 7px 6px; border-radius: 12px; text-align: center; }
      .stat-num { display: block; font-size: 17px; margin: 0; }
      .stat-label { display: block; font-size: 9px; margin-top: 2px; }

      .body { padding: 10px 11px 14px; }
      .composer { padding: 7px; margin-bottom: 10px; border-radius: 16px; }
      .add-row { grid-template-columns: 1fr 56px 42px; gap: 6px; }
      input, select { padding: 9px 9px; font-size: 13px; }
      #addTaskButton { width: 42px; height: 38px; padding: 0; font-size: 0; }
      #addTaskButton::before { content: '+'; font-size: 22px; line-height: 1; font-weight: 850; }

      .sections { gap: 10px; }
      .section { border-radius: 16px; }
      .section-head { padding: 9px 11px; font-size: 12px; }
      .section-count { padding: 3px 7px; font-size: 11px; }
      .task-list { padding: 8px; gap: 8px; }
      .task { grid-template-columns: auto 1fr; padding: 11px; gap: 9px; border-radius: 15px; }
      .check { width: 24px; height: 24px; border-radius: 9px; }
      .task-title { font-size: 14px; line-height: 1.28; }
      .notes {
        font-size: 11px;
        margin-top: 5px;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .task-sub { font-size: 11px; gap: 5px; margin-top: 6px; }
      .task-sub .updated { display: none; }
      .tag { font-size: 10px; padding: 3px 6px; }
      .details { display: none; }
      .task-actions { grid-column: 2; justify-content: flex-start; margin-top: 8px; }
      .task-actions button.small { height: 30px; padding: 0 9px; font-size: 11px; box-shadow: none; }

      .list-grid { grid-template-columns: 1fr; gap: 8px; }
      .list-card { padding: 12px; border-radius: 16px; }
      .list-title { font-size: 15px; margin-bottom: 4px; }
      .list-meta { font-size: 11px; margin-bottom: 8px; line-height: 1.34; }
      .list-stats { display: flex; gap: 5px; margin-bottom: 9px; }
      .mini-stat { padding: 5px 6px; border-radius: 10px; flex: 1; }
      .mini-stat strong { display: inline; font-size: 13px; margin-right: 3px; }
      .mini-stat span { display: inline; font-size: 9px; margin-top: 0; }
      .list-card .actions { position: static; gap: 6px; }
      .list-card .actions button.small { height: 30px; padding: 0 10px; font-size: 11px; }

      .show-more { width: 100%; margin-top: 10px; height: 34px; }
      .empty { padding: 16px 12px; font-size: 12px; border-radius: 15px; }
      .event { padding: 11px; border-radius: 15px; }
      .event-json { font-size: 10px; max-height: 140px; overflow: auto; }
      .toast { margin-top: 8px; font-size: 11px; }
    }

  </style>
</head>
<body>
  <div id="root" class="shell"></div>
  <script>
    const root = document.getElementById('root');
    let current = window.openai?.toolOutput || { view: 'message', message: 'No SharvaTask data received yet.' };
    let busy = false;
    let listLimit = 5;
    let toast = '';
    let toastKind = '';

    window.addEventListener('openai:set_globals', () => {
      current = window.openai?.toolOutput || current;
      render();
    });

    function esc(value) {
      return String(value ?? '').replace(/[&<>'"]/g, ch => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', "'":'&#39;', '"':'&quot;' }[ch]));
    }

    function isDone(item) { return item.status === 'done' || item.status === 'verified'; }
    function isPending(item) { return item.status === 'pending' || item.status === 'in_progress'; }
    function prettyStatus(status) { return String(status || '').replaceAll('_', ' '); }

    function counts(list) {
      const items = list?.items || [];
      return {
        pending: items.filter(isPending).length,
        blocked: items.filter(i => i.status === 'blocked').length,
        done: items.filter(isDone).length,
        total: items.length
      };
    }

    function formatDate(value) {
      if (!value) return '—';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;
      return date.toLocaleString(undefined, { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    function setToast(message, kind) {
      toast = message || '';
      toastKind = kind || '';
    }

    async function callTool(name, args) {
      if (!window.openai?.callTool) {
        setToast('Widget actions are not available in this ChatGPT client yet.', 'error');
        render();
        return;
      }
      busy = true;
      setToast('Working…', 'busy');
      render();
      try {
        const result = await window.openai.callTool(name, args || {});
        const output = result?.structuredContent || result?.mcp_tool_result?.structuredContent || result?.call_tool_result?.structuredContent;
        if (output) current = output;
        setToast('Updated successfully ✅', '');
      } catch (error) {
        setToast('Tool call failed: ' + (error?.message || error), 'error');
      } finally {
        busy = false;
        render();
      }
    }

    function header(title, sub, list) {
      const c = list ? counts(list) : null;
      return `
        <div class="header">
          <div class="header-top">
            <div>
              <div class="eyebrow">SharvaTask MCP</div>
              <h1>${esc(title)}</h1>
              <div class="sub">${esc(sub || current.message || '')}</div>
              ${list ? `<div class="meta-line">
                <span><strong>Project:</strong> ${esc(list.project)}</span>
                <span><strong>Status:</strong> ${esc(list.status)}</span>
                <span><strong>Updated:</strong> ${esc(formatDate(list.updated_at))}</span>
              </div>` : ''}
            </div>
            ${list ? `<div class="actions">
              <button class="small ghost icon-action" aria-label="History" onclick="callTool('show_history', { list_id_or_query: '${esc(list.list_id)}' })" ${busy ? 'disabled' : ''}><span class="btn-icon">◷</span><span class="btn-text">History</span></button>
              <button class="small ghost icon-action" aria-label="Refresh" onclick="callTool('show_list', { list_id_or_query: '${esc(list.list_id)}' })" ${busy ? 'disabled' : ''}><span class="btn-icon">↻</span><span class="btn-text">Refresh</span></button>
              <button class="small danger icon-action" aria-label="Archive" onclick="archiveList('${esc(list.list_id)}')" ${busy || list.status === 'archived' ? 'disabled' : ''}><span class="btn-icon">⌫</span><span class="btn-text">Archive</span></button>
            </div>` : ''}
          </div>
          ${list ? `<div class="stats">
            <div class="stat"><div class="stat-num">${c.pending}</div><div class="stat-label">Pending</div></div>
            <div class="stat"><div class="stat-num">${c.blocked}</div><div class="stat-label">Blocked</div></div>
            <div class="stat"><div class="stat-num">${c.done}</div><div class="stat-label">Done</div></div>
          </div>` : ''}
        </div>`;
    }

    function renderList(list) {
      const items = list.items || [];
      const pending = items.filter(isPending);
      const blocked = items.filter(i => i.status === 'blocked');
      const done = items.filter(i => isDone(i) || i.status === 'dropped');
      return `
        <div class="card">
          ${header(list.title, current.message, list)}
          <div class="body">
            ${list.status !== 'archived' ? `<div class="composer">
              <div class="add-row">
                <input id="newTaskTitle" placeholder="Add a task…" oninput="updateComposerState()" onkeydown="if(event.key==='Enter') addTask('${esc(list.list_id)}')" />
                <select id="newTaskPriority" aria-label="Priority"><option>P1</option><option>P0</option><option>P2</option><option>P3</option></select>
                <button id="addTaskButton" class="primary" onclick="addTask('${esc(list.list_id)}')" ${busy ? 'disabled' : ''}>Add</button>
              </div>
            </div>` : ''}
            ${items.length ? `<div class="sections">
              ${renderSection('Pending', pending, list, false)}
              ${renderSection('Blocked', blocked, list, false)}
              ${done.length ? renderSection('Done', done, list, done.length > 4) : ''}
            </div>` : `<div class="empty"><strong>No tasks yet.</strong>Add your first task above to start tracking this list.</div>`}
            <div class="toast ${esc(toastKind)}">${esc(toast)}</div>
          </div>
        </div>`;
    }

    function renderSection(label, items, list, collapsed) {
      if (!items.length) return '';
      const body = `<div class="task-list">${items.map(item => renderTask(list, item)).join('')}</div>`;
      if (collapsed) {
        return `<details class="section"><summary class="section-head"><span>${esc(label)}</span><span class="section-count">${items.length}</span></summary>${body}</details>`;
      }
      return `<div class="section"><div class="section-head"><span>${esc(label)}</span><span class="section-count">${items.length}</span></div>${body}</div>`;
    }

    function renderTask(list, item) {
      const done = isDone(item);
      const blocked = item.status === 'blocked';
      const dropped = item.status === 'dropped';
      const nextStatus = done ? 'pending' : 'done';
      const rowClass = done || dropped ? 'done' : blocked ? 'blocked' : '';
      return `<div class="task ${rowClass}">
        <button class="check ${done ? 'done' : ''}" title="${done ? 'Reopen task' : 'Mark done'}" onclick="toggleTask('${esc(list.list_id)}','${esc(item.item_id)}','${nextStatus}')" ${busy || list.status === 'archived' ? 'disabled' : ''}>${done ? '✓' : ''}</button>
        <div>
          <div class="task-title ${done ? 'done' : ''}">${esc(item.title)}</div>
          ${item.notes ? `<div class="notes">${esc(item.notes)}</div>` : ''}
          <div class="task-sub">
            <span class="tag status-${esc(item.status)}">${esc(prettyStatus(item.status))}</span>
            <span class="tag">${esc(item.priority)}</span>
            ${item.proof?.length ? `<span class="tag">${item.proof.length} proof</span>` : ''}
            <span class="updated">Updated ${esc(formatDate(item.updated_at))}</span>
          </div>
          <details class="details"><summary>Details</summary><code>${esc(item.item_id)}</code></details>
        </div>
        <div class="task-actions">
          ${!done && !dropped ? `<button class="small primary" onclick="toggleTask('${esc(list.list_id)}','${esc(item.item_id)}','done')" ${busy || list.status === 'archived' ? 'disabled' : ''}>Done</button>` : `<button class="small ghost" onclick="toggleTask('${esc(list.list_id)}','${esc(item.item_id)}','pending')" ${busy || list.status === 'archived' ? 'disabled' : ''}>Reopen</button>`}
          ${!done && !dropped ? `<button class="small ghost" onclick="editTask('${esc(list.list_id)}','${esc(item.item_id)}')" ${busy || list.status === 'archived' ? 'disabled' : ''}>Edit</button>` : ''}
          ${!blocked && !done && !dropped ? `<button class="small ghost" onclick="blockTask('${esc(list.list_id)}','${esc(item.item_id)}')" ${busy || list.status === 'archived' ? 'disabled' : ''}>Block</button>` : ''}
        </div>
      </div>`;
    }

    function renderLists(lists) {
      const allLists = lists || [];
      const visibleLists = allLists.slice(0, listLimit);
      const remaining = Math.max(0, allLists.length - visibleLists.length);
      return `<div class="card">
        ${header(current.query ? 'Search results' : 'Your lists', current.message)}
        <div class="body">
          ${visibleLists.length ? `<div class="list-grid">${visibleLists.map(list => `<div class="list-card">
            <div class="list-title">${esc(list.title)}</div>
            <div class="list-meta">${esc(list.project)} • ${esc(list.status)}<br />Updated ${esc(formatDate(list.updated_at))}</div>
            <div class="list-stats">
              <div class="mini-stat"><strong>${list.pending_count}</strong><span>Pending</span></div>
              <div class="mini-stat"><strong>${list.blocked_count}</strong><span>Blocked</span></div>
              <div class="mini-stat"><strong>${list.done_count}</strong><span>Done</span></div>
            </div>
            <div class="actions" style="justify-content:flex-start;">
              <button class="small primary" onclick="callTool('show_list', { list_id_or_query: '${esc(list.list_id)}' })" ${busy ? 'disabled' : ''}>Open</button>
              <button class="small ghost" onclick="callTool('continue_list', { project_or_query: '${esc(list.list_id)}' })" ${busy ? 'disabled' : ''}>Continue</button>
            </div>
          </div>`).join('')}</div>
          ${remaining ? `<button class="small ghost show-more" onclick="listLimit += 5; render()">Show ${remaining > 5 ? 5 : remaining} more</button>` : ''}` : `<div class="empty"><strong>No lists found.</strong>Create your first SharvaTask list to start building history.</div>`}
          <div class="toast ${esc(toastKind)}">${esc(toast)}</div>
        </div>
      </div>`;
    }


    function historyCopy(event) {
      const payload = event?.payload || {};
      const action = event?.action || '';
      if (action === 'list_created') return { title: 'List created', detail: `${payload.title || 'Untitled'}${payload.project ? ' • ' + payload.project : ''}` };
      if (action === 'task_added') return { title: 'Task added', detail: `${payload.title || payload.item_id || 'Task'}${payload.priority ? ' • ' + payload.priority : ''}` };
      if (action === 'task_updated') return { title: 'Task edited', detail: `${payload.title || payload.item_id || 'Task'}${payload.priority ? ' • ' + payload.priority : ''}` };
      if (action === 'task_status_updated') return { title: 'Status changed', detail: `${payload.status || 'updated'}${payload.notes ? ' • ' + payload.notes : ''}` };
      if (action === 'task_proof_added') return { title: 'Proof added', detail: `${payload.proof || 'Proof note added'}` };
      if (action === 'list_archived') return { title: 'List archived', detail: `${payload.reason || 'Archived'}` };
      return { title: prettyStatus(action), detail: JSON.stringify(payload) };
    }

    function renderHistory(list, events) {
      return `<div class="card">
        ${header('History — ' + (list?.title || 'List'), current.message, list)}
        <div class="body">
          <div class="history">
            ${events?.length ? events.slice().reverse().map(event => {
              const copy = historyCopy(event);
              return `<div class="event">
                <div class="event-action">${esc(copy.title)}</div>
                <div class="sub">${esc(formatDate(event.event_time))} • ${esc(copy.detail)}</div>
                <details class="details"><summary>Raw event</summary><div class="event-json">${esc(JSON.stringify(event.payload, null, 2))}</div></details>
              </div>`;
            }).join('') : `<div class="empty"><strong>No history found.</strong>This list has no recorded events yet.</div>`}
          </div>
          <div class="toast ${esc(toastKind)}">${esc(toast)}</div>
        </div>
      </div>`;
    }

    function renderMessage() {
      return `<div class="card">${header('SharvaTask', current.message)}<div class="body"><div class="empty"><strong>SharvaTask</strong>${esc(current.message)}</div><div class="toast ${esc(toastKind)}">${esc(toast)}</div></div></div>`;
    }

    function render() {
      if (current.view === 'list' && current.list) root.innerHTML = renderList(current.list);
      else if (current.view === 'lists') root.innerHTML = renderLists(current.lists || []);
      else if (current.view === 'history') root.innerHTML = renderHistory(current.list, current.events || []);
      else root.innerHTML = renderMessage();
      updateComposerState();
      window.openai?.notifyIntrinsicHeight?.();
    }

    window.updateComposerState = function() {
      const input = document.getElementById('newTaskTitle');
      const button = document.getElementById('addTaskButton');
      if (button && input) button.disabled = busy || !input.value.trim();
    }

    window.addTask = function(listId) {
      const title = document.getElementById('newTaskTitle')?.value?.trim();
      const priority = document.getElementById('newTaskPriority')?.value || 'P1';
      if (!title) { setToast('Enter a task title first.', 'error'); render(); return; }
      callTool('add_task', { list_id_or_query: listId, title, priority });
    }

    window.toggleTask = function(listId, itemId, status) {
      callTool('update_task_status', { list_id_or_query: listId, item_id_or_title: itemId, status });
    }

    window.blockTask = function(listId, itemId) {
      callTool('update_task_status', { list_id_or_query: listId, item_id_or_title: itemId, status: 'blocked' });
    }


    window.editTask = function(listId, itemId) {
      const list = current?.list;
      const item = list?.items?.find(candidate => candidate.item_id === itemId);
      if (!item) { setToast('Task not found for editing.', 'error'); render(); return; }

      const title = prompt('Edit task title', item.title || '');
      if (title === null) return;
      const trimmedTitle = title.trim();
      if (!trimmedTitle) { setToast('Task title cannot be empty.', 'error'); render(); return; }

      const notes = prompt('Edit note / details', item.notes || '');
      if (notes === null) return;

      const rawPriority = prompt('Priority: P0, P1, P2, or P3', item.priority || 'P1');
      if (rawPriority === null) return;
      const priority = ['P0', 'P1', 'P2', 'P3'].includes(rawPriority.trim().toUpperCase())
        ? rawPriority.trim().toUpperCase()
        : item.priority || 'P1';

      callTool('update_task', {
        list_id_or_query: listId,
        item_id_or_title: itemId,
        title: trimmedTitle,
        notes: notes.trim(),
        priority
      });
    }

    window.archiveList = function(listId) {
      if (confirm('Archive this list? History will stay saved.')) callTool('archive_list', { list_id_or_query: listId, reason: 'Archived from SharvaTask widget' });
    }

    render();
  </script>
</body>
</html>
