const root=document.getElementById('root');let busy=false,listLimit=5,toast='',toastKind='',detailOriginal=null,detailDraft=null,detailEditing=false,detailSaveError='';

function parseText(v){if(typeof v!=='string')return null;try{const p=JSON.parse(v);return obj(p)?p:null}catch{return null}}

function boardOf(o,s){return obj(o?.board)?o.board:obj(s?.board)?s.board:null}function taskIdOf(i){return i?.item_id||i?.task_id||i?.id||''}function normalizeTask(i,p){if(!obj(i))return i;const previous=obj(p)?p:null,next={...i};for(const field of ['next_action','pablo_instruction'])if(typeof next[field]!=='string'&&typeof previous?.[field]==='string')next[field]=previous[field];return next}function normalizeList(l,p){if(!obj(l))return l;const id=l.list_id||l.id||l.listId||l.uuid,previousItems=arr(p?.items,p?.tasks)||[],sourceItems=arr(l.items,l.tasks);const normalized=id&&!l.list_id?{...l,list_id:id}:{...l};if(sourceItems)normalized.items=sourceItems.map(item=>normalizeTask(item,previousItems.find(previous=>taskIdOf(previous)===taskIdOf(item))));return normalized}function listOf(o,p,b){return normalizeList(o?.list||b?.list||o?.board_snapshot?.list||p?.list||null,p?.list)}function listIdOf(list){return list?.list_id||list?.id||list?.listId||current?.active_pointer?.list_id||current?.active_list_id||current?.board_snapshot?.active_pointer?.list_id||''}function listsOf(o,p,s){return arr(o?.lists,s?.lists,o?.list_browser?.lists,o?.results?.lists,p?.lists)||[]}function eventsOf(o,b,s){return arr(o?.events,o?.history?.events,o?.history_events,o?.business_events,s?.events,s?.history?.events,s?.recent_events,b?.events,b?.recent_events)}

function historyGuardActive(s){return s?.view==='history'||s?.mode==='history'||s?.history_loading===true||s?.last_sync_source==='history_click'||s?.diag_kind==='history_clicked'||s?.last_requested_tool==='get_history'||(s?.diag_kind==='calling'&&s?.last_requested_tool==='get_history')}
function detailGuardActive(s){return s?.view==='task_detail'||s?.mode==='task_detail'||s?.last_sync_source==='task_detail_click'||s?.diag_kind==='task_detail_clicked'||s?.last_requested_tool==='get_task_detail'||s?.last_requested_tool==='edit_task_details'||(s?.diag_kind==='calling'&&(s?.last_requested_tool==='get_task_detail'||s?.last_requested_tool==='edit_task_details'))}
function stateVersionOf(s){const value=s?.state_version_after??s?.state_version??s?.board_snapshot?.state_version??s?.board_snapshot?.board?.state_version;return typeof value==='number'&&Number.isFinite(value)?value:null}
function applySetGlobals(){const raw=window.openai?.toolOutput||current,incoming=normalizeOutputToViewState(raw,current,'set_globals'),incomingVersion=stateVersionOf(raw)??stateVersionOf(incoming),currentVersion=stateVersionOf(current);if(incomingVersion!==null&&currentVersion!==null&&incomingVersion<currentVersion){current=addDiagToState({...current,client_received_at:nowIso()},`set_globals ignored stale state v${incomingVersion} < v${currentVersion}`,'stale');render();return}if(historyGuardActive(current)&&incoming.view!=='history'&&incoming.mode!=='history'){current=addDiagToState({...incoming,...current,list:current.list||incoming.list,server_time:current.server_time||incoming.server_time,state_version:incoming.state_version??current.state_version,sync_status:current.sync_status||incoming.sync_status,view:'history',mode:'history',history_loading:current.history_loading!==false,last_requested_tool:current.last_requested_tool||'get_history',last_sync_source:current.last_sync_source||'history_click'},'set_globals preserved History mode','history_guard')}else if(detailGuardActive(current)&&(detailDirty()||incoming.view!=='task_detail'&&incoming.mode!=='task_detail')){current=addDiagToState({...incoming,...current,list:current.list||incoming.list,server_time:current.server_time||incoming.server_time,state_version:incoming.state_version??current.state_version,sync_status:current.sync_status||incoming.sync_status,view:'task_detail',mode:'task_detail',selected_task_id:current.selected_task_id,selected_task:current.selected_task,last_sync_source:current.last_sync_source||'task_detail_click'},detailDirty()?'set_globals preserved dirty Task Detail draft':'set_globals preserved Task Detail mode','detail_guard')}else current=incoming;render()}
function applyToolOutput(result,source){const output=extractStructuredContent(result);if(!output){current=addDiagToState({...current,server_time:nowIso(),client_received_at:nowIso(),last_sync_source:source,history_loading:false},`${source} returned no structuredContent`,'tool_error');if(source==='get_history')current={...current,view:'history',mode:'history',last_requested_tool:'get_history',history_events_missing:true,history_response_received:true};if(source==='edit_task_details'){current={...current,view:'task_detail',mode:'task_detail'};detailSaveError='Save failed because no structured state was returned. Your draft is preserved; retry Save.'}setToast(source==='edit_task_details'?'Save failed. Draft preserved.':'Tool returned no structured state. Showing visible fallback.','error');render();return false}if(source==='edit_task_details'&&(output.error_code||output.success===false)){current=addDiagToState({...current,view:'task_detail',mode:'task_detail',message:output.message||current.message,last_requested_tool:'edit_task_details'},`edit_task_details failed: ${output.error_code||'unknown error'}`,'tool_error');detailSaveError=output.message||`Save failed (${output.error_code||'unknown error'}). Your draft is preserved; retry Save.`;setToast('Save failed. Draft preserved.','error');render();return false}current=normalizeOutputToViewState(output,current,source);if(source==='get_history')current={...current,view:'history',mode:'history',last_requested_tool:'get_history',history_loading:false,history_response_received:true};if(source==='refresh_board_state')current={...current,last_requested_tool:'refresh_board_state'};if(source==='edit_task_details'){const saved=output.task||taskById(current.list,current.selected_task_id)||current.selected_task;current={...current,view:'task_detail',mode:'task_detail',selected_task_id:itemId(saved)||current.selected_task_id,selected_task:saved,last_requested_tool:'edit_task_details'};setDetailBaseline(saved);detailEditing=false;det function header(title,sub,list){const c=list?counts(list):null,show=sub&&!String(sub).startsWith('Board snapshot ready:'),listId=listIdOf(list),hasList=!!list,disabled=busy||!listId,reason=!listId?'Missing list_id; controls disabled until backend list id is available':'';return`<div class="head"><div class="top"><div class="top-main"><div class="brand">SharvaTask</div><h1>${esc(title)}</h1>${show?`<div class="sub">${esc(sub)}</div>`:''}<div class="sync">${syncLine()}</div><div class="diag">${diagLine()}</div></div>${hasList?`<div class="actions"><button aria-label="History" title="${esc(reason||'Open history')}" data-action="history" data-list-id="${esc(listId)}" ${disabled?'disabled':''}>◷ <span class="txt">History</span></button><button aria-label="Refresh" title="${esc(reason||'Refresh board')}" data-action="refresh" data-list-id="${esc(listId)}" ${disabled?'disabled':''}>↻ <span class="txt">Refresh</span></button><button class="danger" aria-label="Archive" title="${esc(reason||'Archive list')}" data-action="archive" data-list-id="${esc(listId)}" ${disabled||list.status==='archived'?'disabled':''}>⌫ <span class="txt">Archive</span></button></div>`:''}</div>${list&&!listId?`<div class="diag"><span class="pill no_calltool">controls disabled: missing list_id</span></div>`:''}${list?`<div class="counts"><span class="pill count"><strong>${c.pending}</strong>Pending</span><span class="pill count"><strong>${c.done}</strong>Done</span><span class="pill count"><strong>${c.blocked}</strong>Blocked</span></div>`:''}</div>`}
function items(list){return list?.items||list?.tasks||[]}function itemId(i){return taskIdOf(i)}

function renderList(list){const it=items(list),pend=it.filter(pending),block=it.filter(i=>i.status==='blocked'),dn=it.filter(i=>done(i)||i.status==='dropped');return`<div class="card">${header(list.title,current.message,list)}<div class="body">${list.status!=='archived'?`<div class="composer"><div class="add-row"><input id="newTaskTitle" placeholder="Add a task…" /><select id="newTaskPriority"><option>P1</option><option>P0</option><option>P2</option><option>P3</option></select><button id="addTaskButton" class="primary" data-action="add-task" data-list-id="${esc(list.list_id)}" ${busy?'disabled':''}>Add</button></div></div>`:''}${it.length?`${section('Pending',pend,list)}${section('Blocked',block,list)}${section('Done',dn,list)}`:`<div class="empty"><strong>No tasks yet.</strong>Add your first task above to start tracking this list.</div>`}<div class="toast ${esc(toastKind)}">${esc(toast)}</div></div></div>`}
function section(label,it,list){if(!it.length)return'';return`<div class="section"><div class="section-head"><span>${esc(label)}</span><span>${it.length}</span></div><div class="tasks">${it.map(i=>task(list,i)).join('')}</div></div>`}
function task(list,i){const d=done(i),b=i.status==='blocked',drop=i.status==='dropped',next=d?'pending':'done',id=itemId(i);return`<div class="task ${d||drop?'done':b?'blocked':''}"><button class="check" data-action="status" data-list-id="${esc(list.list_id)}" data-item-id="${esc(id)}" data-status="${esc(next)}" ${busy||list.status==='archived'?'disabled':''}>${d?'✓':''}</button><div><div class="title">${esc(i.title)}</div>${i.notes?`<div class="notes">${esc(i.notes)}</div>`:''}<div class="task-sub"><span class="tag status-${esc(i.status)}">${esc(pretty(i.status))}</span><span class="tag">${esc(i.priority)}</span>${i.proof?.length?`<span class="tag">${i.proof.length} proof</span>`:''}</div></div><div class="task-actions"><button data-action="task-detail" data-list-id="${esc(list.list_id)}" data-item-id="${esc(id)}" ${busy?'disabled':''}>Open/Edit</button>${!d&&!drop?`<button class="primary" data-action="status" data-list-id="${esc(list.list_id)}" data-item-id="${esc(id)}" data-status="done" ${busy||list.status==='archived'?'disabled':''}>Done</button>`:`<button data-action="status" data-list-id="${esc(list.list_id)}" data-item-id="${esc(id)}" data-status="pending" ${busy||list.status==='archived'?'disabled':''}>Reopen</button>`}${!b&&!d&&!drop?`<button data-action="status" data-list-id="${esc(list.list_id)}" data-item-id="${esc(id)}" data-status="blocked" ${busy||list.status==='archived'?'disabled':''}>Block</button>`:''}${!drop?`<button data-action="proof" data-list-id="${esc(list.list_id)}" data-item-id="${esc(id)}" ${busy||list.status==='archived'?'disabled':''}>Proof</button>`:''}</div></div>`}
function renderTaskDetail(list){const task=taskById(list,current.selected_task_id)||current.selected_task;if(!task)return`<div class="card">${header('Task detail',current.message,list)}<div class="body"><div class="actions" style="justify-content:flex-start;position:static;margin-bottom:9px"><button data-action="back-board">Back</button></div><div class="empty"><strong>Task not found in current board snapshot.</strong>Refresh the board or return to the list.</div><div class="toast ${esc(toastKind)}">${esc(toast)}</div></div></div>`;ensureDetailDraft(task);const proof=Array.isArray(task.proof)?task.proof:[],latest=proof.length?proof[proof.length-1]:'No proof yet',draft=detailDraft||taskDraft(task),editor=detailEditing?`<div class="detail-editor"><label class="detail-field"><span class="detail-label">Title</span><input data-detail-field="title" value="${esc(draft.title)}" /></label><label class="detail-field"><span class="detail-label">Notes</span><textarea data-detail-field="notes">${esc(draft.notes)}</textarea></label><label class="detail-field"><span class="detail-label">Next action</span><textarea data-detail-field="next_action">${esc(draft.next_action)}</textarea></label><label class="detail-field"><span class="detail-label">Pablo instruction</span><textarea data-detail-field="pablo_instruction">${esc(draft.pablo_instruction)}</textarea></label><div class="actions" style="justify-content:flex-start;position:static"><button id="saveTaskDetails" class="primary" data-action="save-detail" ${busy||!detailDirty()||!draft.title.trim()?'disabled':''}>${busy?'Saving…':'Save'}</button><button data-action="cancel-edit" ${busy?'disabled':''}>Cancel</button><span id="detailDirtyState" class="detail-dirty">${detailDirty()?'Unsaved changes':'No unsaved changes'}</span></div></div>`:`<div class="detail-title">${esc(task.title)}</div><div class="detail-grid"><div class="detail-field"><div class="detail-label">Notes</div><div class="detail-value">${esc(task.notes||'No notes yet.')}</div></div><div class="detail-field"><div class="detail-label">Next action</div><div class="detail-value">${esc(task.next_action||'No next action set.')}</div></div><div class="detail-field"><div class="detail-label">Pablo instruction</div><div class="detail-value">${esc(task.pablo_instruction||'No Pablo instruction set.')}</div></div><div class="detail-field"><div class="detail-label">Latest proof</div><div class="detail-value">${esc(latest)}</div></div></div>`;return`<div class="card">${header(task.title,detailEditing?'Editable task detail':'Task detail',list)}<div class="body"><div class="actions" style="justify-content:flex-start;position:static;margin-bottom:9px"><button data-action="back-board" ${busy?'disabled':''}>Back</button>${detailEditing?'':`<button class="primary" data-action="edit-detail" ${busy?'disabled':''}>Edit</button>`}<button data-action="refresh" data-list-id="${esc(listIdOf(list))}" ${busy||detailDirty()||!listIdOf(list)?'disabled':''}>Refresh board</button></div><div class="detail-panel"><div class="task-sub"><span class="tag status-${esc(task.status)}">${esc(pretty(task.status))}</span>${task.priority?`<span class="tag">${esc(task.priority)}</span>`:''}<span class="tag">${proof.length} proof${proof.length===1?'':'s'}</span></div>${editor}${detailSaveError?`<div class="detail-error" role="alert">${esc(detailSaveError)}</div>`:''}<details><summary>Debug task identity</summary><div class="raw">${esc(JSON.stringify({task_id:itemId(task),list_id:listIdOf(list)},null,2))}</div></details></div><div class="toast ${esc(toastKind)}">${esc(toast)}</div></div></div>`}
function renderLists(lists){const all=lists||[],vis=all.slice(0,listLimit),rem=Math.max(0,all.length-vis.length);return`<div class="card">${header(current.query?'Search results':'Your lists',current.message)}<div class="body">${vis.length?`<div class="grid">${vis.map(l=>`<div class="list-card"><div class="list-title">${esc(l.title)}</div><div class="meta">${esc(l.project||'SharvaTask')} • ${esc(l.status)} • ${esc(fmt(l.updated_at||l.last_mutation_at))}</div><div class="counts"><span class="pill count"><strong>${l.pending_count??0}</strong>Pending</span><span class="pill count"><strong>${l.done_count??0}</strong>Done</span><span class="pill count"><strong>${l.blocked_count??0}</strong>Blocked</span></div><button class="primary" data-action="open-list" data-list-id="${esc(l.list_id)}" ${busy?'disabled':''}>Open</button></div>`).join('')}</div>${rem?`<button data-action="show-more">Show ${rem>5?5:rem} more</button>`:''}`:`<div class="empty"><strong>No lists found.</strong>Create your first SharvaTask list to start building history.</div>`}<div class="toast ${esc(toastKind)}">${esc(toast)}</div></div></div>`}
function historyCopy(e){const p=e?.payload||e?.after||{},a=e?.action||e?.event_type||'';if(a==='list_created'||a==='list.created')return{t:'List created',d:p.title||'Untitled'};if(a==='task_added'||a==='task.created')return{t:'Task added',d:p.title||p.item_id||p.task_id||'Task'};if(a==='task_updated'||a==='task.updated')return{t:'Task edited',d:p.title||p.item_id||p.task_id||'Task'};if(a==='task_status_updated'||a==='task.status_changed')return{t:'Status changed',d:p.status||'updated'};if(a==='task_proof_added'||a==='proof.added')return{t:'Proof added',d:p.proof||p.content||'Proof note added'};if(a==='list_archived'||a==='list.archived')return{t:'List archived',d:p.reason||'Archived'};return{t:pretty(a||'event'),d:JSON.stringify(p)}}
function renderHistory(list,events){let content='';if(current.history_loading)content=`<div class="empty"><strong>Loading history…</strong>History mode is locked. Waiting for get_history response.</div>`;else if(current.history_events_missing)content=`<div class="empty"><strong>History response received but no events field was returned</strong>The click/render chain ran. Reload history or refresh the board.</div>`;else if(Array.isArray(events)&&events.length)content=events.slice().reverse().map(e=>{const c=historyCopy(e);return`<div class="event"><div class="event-title">${esc(c.t)}</div><div class="meta">${esc(fmt(e.event_time||e.created_at))} • ${esc(c.d)}</div><details><summary>Raw event</summary><div class="raw">${esc(JSON.stringify(e.payload||e,null,2))}</div></details></div>`}).join('');else content=`<div class="empty"><strong>No business events yet.</strong>History mode is open, but the backend returned an empty events array.</div>`;return`<div class="card">${header('History - '+(list?.title||'List'),current.message,list)}<div class="body"><div class="actions" style="justify-content:flex-start;position:static;margin-bottom:9px"><button data-action="refresh" data-list-id="${esc(list?.list_id||'')}" ${busy||!list?.list_id?'disabled':''}>Back to board</button><button data-action="history" data-list-id="${esc(list?.list_id||'')}" ${busy||!list?.list_id?'disabled':''}>Reload history</button></div><div class="history">${content}</div><div class="toast ${esc(toastKind)}">${esc(toast)}</div></div></div>`}
function renderMessage(){return`<div class="card">${header('SharvaTask',current.message)}<div class="body"><div class="empty"><strong>SharvaTask</strong>${esc(current.message)}</div><div class="toast ${esc(toastKind)}">${esc(toast)}</div></div></div>`}
function isHistoryMode(){return current.view==='history'||current.mode==='history'||current.history_loading===true||current.last_sync_source==='history_click'||current.diag_kind==='history_clicked'||current.last_requested_tool==='get_history'||(current.diag_kind==='calling'&&current.last_requested_tool==='get_history')}function isTaskDetailMode(){return current.view==='task_detail'||current.mode==='task_detail'||current.last_sync_source==='task_detail_click'||current.diag_kind==='task_detail_clicked'||current.last_requested_tool==='get_task_detail'||current.last_requested_tool==='edit_task_details'||(current.diag_kind==='calling'&&(current.last_requested_tool==='get_task_detail'||current.last_requested_tool==='edit_task_details'))}function render(){if(isHistoryMode())root.innerHTML=renderHistory(current.list,current.events||[]);else if(isTaskDetailMode()&&current.list)root.innerHTML=renderTaskDetail(current.list);else if((current.view==='list'||current.mode==='list')&&current.list)root.innerHTML=renderList(current.list);else if(current.view==='lists'||current.mode==='lists')root.innerHTML=renderLists(current.lists||[]);else root.innerHTML=renderMessage();updateComposerState();updateDetailEditorState();window.openai?.notifyIntrinsicHeight?.()}
function updateComposerState(){const i=document.getElementById('newTaskTitle'),b=document.getElementById('addTaskButton');if(b&&i)b.disabled=busy||!i.value.trim()}
function addTask(listId){const title=document.getElementById('newTaskTitle')?.value?.trim(),priority=document.getElementById('newTaskPriority')?.value||'P1';if(!title){setToast('Enter a task title first.','error');render();return}callTool('add_task',{list_id_or_query:listId,title,priority})}
function refreshBoard(listId){const t=nowIso();current=addDiagToState({...current,view:'list',mode:'list',selected_task_id:null,selected_task:null,history_loading:false,history_events_missing:false,history_response_received:false,sync_status:'refresh_clicked',server_time:t,client_received_at:t,last_requested_tool:'refresh_board_state',last_sync_source:'refresh_click'},'Refresh click handler fired','refresh_clicked');setToast('Refresh click received. Calling backend…','busy');render();return callTool('refresh_board_state',{list_id_or_query:listId})}
function enterHistory(listId){const t=nowIso();current=addDiagToState({...current,view:'history',mode:'history',sync_status:'history_clicked',server_time:t,client_received_at:t,last_requested_tool:'get_history',last_sync_source:'history_click',history_loading:true,history_events_missing:false,history_response_received:false,events:Array.isArray(current.events)?current.events:[]},'History click handler fired','history_clicked');setToast('History click received. Calling backend…','busy');render();callTool('get_history',{list_id_or_query:listId})}
function openTaskDetail(listId,itemId){const list=current.list,task=taskById(list,itemId);clearDetailDraft();if(task)setDetailBaseline(task);current=addDiagToState({...current,view:'task_detail',mode:'task_detail',selected_task_id:itemId,selected_task:task,last_sync_source:'task_detail_click',last_requested_tool:null,sync_status:'task_detail_clicked',server_time:nowIso(),client_received_at:nowIso()},'Task detail click handler fired','task_detail_clicked');setToast('Task detail opened.','');render()}
function saveTaskDetails(){const listId=listIdOf(current.list),taskId=current.selected_task_id||itemId(current.selected_task);if(!detailDraft||!detailOriginal||!listId||!taskId){detailSaveError='Stable list/task IDs are required before saving. Your draft is preserved.';setToast('Save blocked. Draft preserved.','error');render();return false}if(!detailDraft.title.trim()){detailSaveError='Title cannot be empty. Your draft is preserved.';setToast('Enter a task title before saving.','error');render();return false}const args={list_id_or_query:listId,item_id_or_title:taskId};for(const field of editableTaskFields)if(detailDraft[field]!==detailOriginal[field])args[field]=field==='title'?detailDraft[field].trim():detailDraft[field];if(Object.keys(args).length===2){setToast('No changes to save.','');render();return false}detailSaveError='';return callTool('edit_task_details',args)}
function backToBoard(){if(detailDirty()&&!confirm('Discard unsaved task detail changes and return to the board?')){setToast('Unsaved changes kept.','');render();return false}clearDetailDraft();current=addDiagToState({...current,view:'list',mode:'list',selected_task_id:null,selected_task:null,last_sync_source:'task_detail_back',last_requested_tool:null},'Back to board from task detail','task_detail_back');setToast('Back to board.','');render();return true}
async function callTool(name,args){if(!window.openai?.callTool){current=addDiagToState({...current,last_requested_tool:name},`${name} no_calltool`,'no_calltool');if(name==='edit_task_details')detailSaveError='The app-side tool bridge is unavailable. Your draft is preserved; retry Save when connected.';setToast(name==='edit_task_details'?'Save unavailable. Draft preserved.':'App-side tool bridge is unavailable in this surface.','error');render();return false}busy=true;current=addDiagToState({...current,last_requested_tool:name,last_sync_source:name},`calling ${name}`,'calling');setToast(`Calling ${pretty(name)}…`,'busy');render();try{const result=await window.openai.callTool(name,args||{});busy=false;return applyToolOutput(result,name)}catch(err){busy=false;current=addDiagToState({...current,last_requested_tool:name,history_loading:false},`${name} tool_error: ${err?.message||err}`,'tool_error');if(name==='edit_task_details'){current={...current,view:'task_detail',mode:'task_detail'};detailSaveError=`Save failed: ${err?.message||err}. Your draft is preserved; retry Save.`}setToast(name==='edit_task_details'?'Save failed. Draft preserved.':`${pretty(name)} failed. See diagnostics.`, 'error');render();return false}}
function handleAction(el){const a=el.dataset.action,listId=el.dataset.listId,itemId=el.dataset.itemId,status=el.dataset.status;if(a==='refresh')return refreshBoard(listId);if(a==='history')return enterHistory(listId);if(a==='task-detail')return openTaskDetail(listId,itemId);if(a==='edit-detail')return beginTaskEdit();if(a==='save-detail')return saveTaskDetails();if(a==='cancel-edit')return cancelTaskEdit();if(a==='back-board')return backToBoard();if(a==='add-task')return addTask(listId);if(a==='status')return callTool('update_task_status',{list_id_or_query:listId,item_id_or_title:itemId,status});if(a==='proof'){const proof=prompt('Add proof note or link');if(proof===null)return;const trimmed=proof.trim();if(!trimmed){setToast('Proof cannot be empty.','error');render();return}return callTool('add_proof',{list_id_or_query:listId,item_id_or_title:itemId,proof:trimmed})}if(a==='archive'){if(confirm('Archive this list? History will stay saved.'))return callTool('archive_list',{list_id_or_query:listId,reason:'Archived from SharvaTask widget'})}if(a==='open-list')return callTool('get_board_snapshot',{list_id_or_query:listId});if(a==='show-more'){listLimit+=5;render()}}
root.addEventListener('click',event=>{const el=event.target.closest('[data-action]');if(!el||!root.contains(el))return;event.preventDefault();setDiag(`DOM click captured: ${el.dataset.action}`,'click');render();handleAction(el);});
root.addEventListener('input',event=>{if(event.target?.id==='newTaskTitle')updateComposerState();const field=event.target?.dataset?.detailField;if(field)updateDetailDraft(field,event.target.value);});
root.addEventListener('keydown',event=>{if(event.target?.id==='newTaskTitle'&&event.key==='Enter'){event.preventDefault();const listId=event.target.closest('.card')?.querySelector('[data-action="add-task"]')?.dataset.listId;if(listId)addTask(listId);}});
render();
</script></body></html>
