<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SharvaTask</title>
<style>
:root{color-scheme:light;--paper:rgba(255,255,255,.9);--soft:rgba(255,255,255,.55);--ink:#1c1b1a;--muted:#736d67;--line:rgba(183,171,157,.35);--brand:#8b5cf6;--ok:#14814b;--warn:#b56a10;--danger:#c2413d;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
*{box-sizing:border-box}body{margin:0;background:transparent;color:var(--ink);-webkit-font-smoothing:antialiased}.shell{width:min(900px,100%);margin:0 auto;padding:8px}.card{background:linear-gradient(180deg,var(--paper),rgba(247,242,235,.86));border:1px solid rgba(255,255,255,.62);border-radius:22px;overflow:hidden;box-shadow:0 10px 28px rgba(15,16,20,.08);backdrop-filter:blur(20px)}.header{padding:14px 16px 12px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.42)}.header-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}.title-wrap{min-width:0}.eyebrow{color:var(--brand);font-weight:900;font-size:10px;text-transform:uppercase;letter-spacing:.12em;margin-bottom:4px}h1{font-size:21px;line-height:1.12;letter-spacing:-.03em;margin:0;overflow-wrap:anywhere}.sub{color:var(--muted);font-size:12px;line-height:1.35;margin-top:6px;max-width:64ch}.sync-line,.count-strip,.task-sub,.actions{display:flex;flex-wrap:wrap;align-items:center}.sync-line{gap:6px;margin-top:8px;color:var(--muted);font-size:11px;font-weight:750}.sync-pill,.count-pill,.tag{display:inline-flex;border:1px solid var(--line);background:var(--soft);border-radius:999px;white-space:nowrap}.sync-pill{padding:3px 7px}.sync-pill.fresh{color:var(--ok);background:rgba(20,129,75,.10)}.sync-pill.error,.sync-pill.conflict,.sync-pill.stale{color:var(--danger);background:rgba(194,65,61,.12)}.actions{gap:6px;justify-content:flex-end;flex-shrink:0}button,input,select{font:inherit}button{border:1px solid rgba(255,255,255,.64);background:rgba(255,255,255,.68);color:var(--ink);border-radius:999px;padding:8px 11px;cursor:pointer;font-size:12px;font-weight:760;box-shadow:0 5px 12px rgba(15,16,20,.04)}button:hover:not(:disabled){border-color:rgba(139,92,246,.42);background:rgba(255,255,255,.82);transform:translateY(-1px)}button.primary{background:linear-gradient(180deg,#9c74ff,#8b5cf6);border-color:rgba(139,92,246,.45);color:white}button.danger{color:var(--danger);background:rgba(255,240,238,.58);border-color:rgba(194,65,61,.20)}button:disabled{opacity:.55;cursor:not-allowed;transform:none}.count-strip{gap:7px;margin-top:11px}.count-pill{gap:5px;align-items:baseline;padding:6px 10px;font-size:12px;color:var(--muted);font-weight:760}.count-pill strong{color:var(--ink);font-size:15px}.body{padding:12px 14px 14px}.composer{background:rgba(255,255,255,.34);border:1px solid rgba(255,255,255,.50);border-radius:17px;padding:8px;margin-bottom:11px}.add-row{display:grid;grid-template-columns:1fr 72px auto;gap:7px;align-items:center}input,select{border:1px solid rgba(255,255,255,.62);background:rgba(255,255,255,.72);color:var(--ink);border-radius:999px;padding:10px 12px;min-width:0;outline:none;font-size:13px}input:focus,select:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(124,58,237,.12)}.sections{display:flex;flex-direction:column;gap:9px}.section{background:rgba(255,255,255,.22);border:1px solid rgba(255,255,255,.40);border-radius:16px;overflow:hidden}.section-head{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;font-size:12px;font-weight:850;background:rgba(255,255,255,.24);border-bottom:1px solid var(--line)}.section-count{color:var(--muted);background:var(--soft);border:1px solid rgba(255,255,255,.60);border-radius:999px;padding:2px 7px;font-size:11px}.task-list{display:flex;flex-direction:column;gap:7px;padding:8px}.task{display:grid;grid-template-columns:auto 1fr auto;gap:9px;align-items:flex-start;padding:10px;border:1px solid rgba(255,255,255,.58);border-radius:14px;background:rgba(255,255,255,.72);box-shadow:0 6px 16px rgba(21,24,28,.04)}.task.blocked{background:linear-gradient(180deg,rgba(255,249,238,.82),rgba(255,246,229,.72));border-color:rgba(235,192,120,.38)}.task.done{background:rgba(250,250,248,.64);opacity:.84}.check{width:25px;height:25px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0;flex-shrink:0;color:var(--brand);font-weight:950}.check.done{background:rgba(20,129,75,.10);color:var(--ok);border-color:#b7e4c3}.task-title{font-weight:850;font-size:14px;line-height:1.30;letter-spacing:-.01em}.task-title.done{text-decoration:line-through;color:var(--muted)}.notes{color:var(--muted);font-size:11px;margin-top:5px;line-height:1.36;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}.task-sub{gap:5px;color:var(--muted);font-size:11px;margin-top:6px}.tag{gap:4px;font-size:10px;padding:3px 6px;color:var(--muted);font-weight:730}.tag.status-pending,.tag.status-in_progress{color:var(--brand);background:rgba(140,92,246,.13)}.tag.status-blocked{color:var(--warn);background:rgba(235,170,72,.16)}.tag.status-done,.tag.status-verified{color:var(--ok);background:rgba(20,129,75,.10)}.tag.status-dropped{color:var(--danger);background:rgba(194,65,61,.12)}.task-actions{display:flex;gap:5px;align-items:center;flex-wrap:wrap;justify-content:flex-end}.task-actions button{padding:6px 8px;font-size:11px}.list-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:9px}.list-card,.event{border:1px solid rgba(255,255,255,.56);background:rgba(255,255,255,.64);border-radius:15px;padding:10px}.list-title,.event-action{font-weight:900;color:var(--ink)}.list-title{font-size:15px;line-height:1.25;margin-bottom:6px}.list-meta,.event-sub{color:var(--muted);font-size:11px;line-height:1.35;margin-top:4px}.list-stats{display:flex;gap:5px;margin:8px 0}.mini-stat{background:rgba(255,255,255,.44);border:1px solid rgba(255,255,255,.54);border-radius:10px;padding:5px 6px;text-align:center;flex:1}.mini-stat strong{display:inline;font-size:13px;margin-right:3px}.mini-stat span{display:inline;color:var(--muted);font-size:9px;font-weight:750}.history{display:flex;flex-direction:column;gap:8px}.event-json{color:var(--muted);font-size:10px;margin-top:8px;white-space:pre-wrap;word-break:break-word;background:var(--soft);border:1px solid var(--line);border-radius:10px;padding:8px;max-height:130px;overflow:auto}details.raw-event summary{margin-top:6px;cursor:pointer;color:var(--brand);font-size:11px;font-weight:800}.empty{color:var(--muted);padding:18px 12px;text-align:center;border:1px dashed var(--line);border-radius:15px;background:rgba(255,255,255,.32);line-height:1.42;font-size:12px}.empty strong{color:var(--ink);display:block;margin-bottom:4px}.toast{margin-top:9px;color:var(--muted);font-size:11px;min-height:16px;font-weight:720}.toast.busy{color:var(--brand)}.toast.error{color:var(--danger)}
@media(max-width:640px){.shell{padding:6px}.header{padding:12px 12px 10px}.header-top{display:block;padding-right:102px;position:relative}.actions{position:absolute;top:0;right:0;gap:4px}.actions button.icon-action{width:30px;height:30px;padding:0;display:inline-flex;align-items:center;justify-content:center}.actions .btn-text,.eyebrow{display:none}h1{font-size:19px}.sub{font-size:11px;margin-top:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}.sync-line{font-size:10px;gap:4px;margin-top:7px}.count-strip{gap:5px;margin-top:8px}.count-pill{padding:4px 7px;font-size:10px}.count-pill strong{font-size:13px}.body{padding:8px 9px 11px}.composer{padding:6px;margin-bottom:8px;border-radius:14px}.add-row{grid-template-columns:1fr 50px 38px;gap:5px}input,select{padding:8px;font-size:12px}#addTaskButton{width:38px;height:34px;padding:0;font-size:0}#addTaskButton::before{content:'+';font-size:20px;font-weight:850}.section-head{padding:8px 9px;font-size:11px}.task-list{padding:6px;gap:6px}.task{grid-template-columns:auto 1fr;padding:9px;gap:8px;border-radius:13px}.task-actions{grid-column:2;justify-content:flex-start;margin-top:6px}.task-actions button{height:28px;padding:0 8px;font-size:10px;box-shadow:none}.list-grid{grid-template-columns:1fr;gap:7px}}
</style>
</head>
<body>
<div id="root" class="shell"></div>
<script>
const root=document.getElementById('root');
let current=normalizeOutputToViewState(window.openai?.toolOutput||{view:'message',message:'No SharvaTask data received yet.'},null,'initial');
let busy=false,listLimit=5,toast='',toastKind='';
window.addEventListener('openai:set_globals',()=>{current=normalizeOutputToViewState(window.openai?.toolOutput||current,current,'set_globals');render();});
function esc(v){return String(v??'').replace(/[&<>'"]/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[ch]));}
function isObject(v){return v&&typeof v==='object'&&!Array.isArray(v)}function isDone(i){return i.status==='done'||i.status==='verified'}function isPending(i){return i.status==='pending'||i.status==='in_progress'}function prettyStatus(s){return String(s||'').replaceAll('_',' ')}function firstArray(...v){return v.find(Array.isArray)}
function counts(list){const items=list?.items||[];return{pending:items.filter(isPending).length,blocked:items.filter(i=>i.status==='blocked').length,done:items.filter(isDone).length,total:items.length};}
function formatDate(v){if(!v)return'not synced';const d=new Date(v);return Number.isNaN(d.getTime())?v:d.toLocaleString(undefined,{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});}
function setToast(m,k){toast=m||'';toastKind=k||'';}
function extractStructuredContent(r){return r?.structuredContent||r?.mcp_tool_result?.structuredContent||r?.call_tool_result?.structuredContent||r?.result?.structuredContent||r?.data?.structuredContent||r?.content?.find?.(i=>i?.structuredContent)?.structuredContent||r?.content?.find?.(i=>i?.type==='structuredContent')?.structuredContent||(r?.response_type||r?.view?r:null);}
function modeFromOutput(o,p,source){if(source==='get_history'||o?.response_type==='history')return'history';if(source==='browse_lists'||o?.response_type==='list_browser'||source==='search_board'||o?.response_type==='search_results')return'lists';if(o?.mode_recommendation==='history')return'history';if(o?.mode_recommendation==='list_browser'||o?.mode_recommendation==='ambiguity_resolution')return'lists';if(o?.view)return o.view;if(o?.board_snapshot?.board?.list||o?.board?.list||o?.list)return'list';return p?.view||'message';}
function normalizeOutputToViewState(o,p,source){if(!isObject(o))return{...(p||{}),view:p?.view||'message',message:p?.message||'No SharvaTask data received yet.',output_shape_error:true};const snap=isObject(o.board_snapshot)?o.board_snapshot:null;const board=isObject(o.board)?o.board:snap?.board;const list=o.list||board?.list||p?.list;const lists=firstArray(o.lists,snap?.lists,p?.lists)||[];const eventsField=firstArray(o.events,o.history?.events,board?.recent_events);const hasEvents=Array.isArray(o.events)||Array.isArray(o.history?.events)||Array.isArray(board?.recent_events);const view=modeFromOutput(o,p,source);return{...(p||{}),...o,view,message:o.message||p?.message||'SharvaTask state ready.',list,lists,events:view==='history'?(eventsField||[]):(o.events||p?.events||[]),history_events_missing:view==='history'&&!hasEvents&&!o.error_code,history_loading:false,sync_status:o.sync_status||snap?.sync_status||p?.sync_status||'fresh',server_time:o.server_time||snap?.server_time||board?.snapshot_created_at||p?.server_time,state_version:o.state_version_after??o.state_version??snap?.state_version??board?.state_version??p?.state_version,board_snapshot:snap||p?.board_snapshot,response_type:o.response_type||p?.response_type};}
function applyToolOutput(result,source){const output=extractStructuredContent(result);if(!output){setToast('Tool returned no structured state. Keeping last board visible.','error');return false;}current=normalizeOutputToViewState(output,current,source);if(current.error_code)setToast(current.message||`SharvaTask error: ${current.error_code}`,'error');else if(source==='refresh_board_state')setToast('Synced from backend ✅','');else if(source==='get_history')setToast('History loaded ✅','');else setToast('Updated successfully ✅','');return true;}
function syncLine(){const status=current.sync_status||'fresh';const version=current.state_version??current.state_version_after??'—';return`<span class="sync-pill ${esc(status)}">${esc(prettyStatus(status))}</span><span class="sync-pill">v${esc(version)}</span><span class="sync-pill">${esc(formatDate(current.server_time))}</span>`;}
async function callTool(name,args){if(!window.openai?.callTool){setToast('Widget actions are not available in this ChatGPT client yet.','error');render();return false;}busy=true;setToast(name==='refresh_board_state'?'Refreshing…':name==='get_history'?'Loading history…':'Working…','busy');render();try{return applyToolOutput(await window.openai.callTool(name,args||{}),name);}catch(e){setToast('Tool call failed: '+(e?.message||e),'error');return false;}finally{busy=false;render();}}
function header(title,sub,list){const c=list?counts(list):null;const show=sub&&!String(sub).startsWith('Board snapshot ready:');return`<div class="header"><div class="header-top"><div class="title-wrap"><div class="eyebrow">SharvaTask</div><h1>${esc(title)}</h1>${show?`<div class="sub">${esc(sub)}</div>`:''}<div class="sync-line">${syncLine()}</div></div>${list?`<div class="actions"><button class="ghost icon-action" aria-label="History" onclick="enterHistory('${esc(list.list_id)}')" ${busy?'disabled':''}><span class="btn-icon">◷</span><span class="btn-text">History</span></button><button class="ghost icon-action" aria-label="Refresh" onclick="refreshBoard('${esc(list.list_id)}')" ${busy?'disabled':''}><span class="btn-icon">↻</span><span class="btn-text">Refresh</span></button><button class="danger icon-action" aria-label="Archive" onclick="archiveList('${esc(list.list_id)}')" ${busy||list.status==='archived'?'disabled':''}><span class="btn-icon">⌫</span><span class="btn-text">Archive</span></button></div>`:''}</div>${list?`<div class="count-strip"><div class="count-pill"><strong>${c.pending}</strong> Pending</div><div class="count-pill"><strong>${c.done}</strong> Done</div><div class="count-pill"><strong>${c.blocked}</strong> Blocked</div></div>`:''}</div>`;}
function renderList(list){const items=list.items||[],pending=items.filter(isPending),blocked=items.filter(i=>i.status==='blocked'),done=items.filter(i=>isDone(i)||i.status==='dropped');return`<div class="card">${header(list.title,current.message,list)}<div class="body">${list.status!=='archived'?`<div class="composer"><div class="add-row"><input id="newTaskTitle" placeholder="Add a task…" oninput="updateComposerState()" onkeydown="if(event.key==='Enter') addTask('${esc(list.list_id)}')" /><select id="newTaskPriority" aria-label="Priority"><option>P1</option><option>P0</option><option>P2</option><option>P3</option></select><button id="addTaskButton" class="primary" onclick="addTask('${esc(list.list_id)}')" ${busy?'disabled':''}>Add</button></div></div>`:''}${items.length?`<div class="sections">${renderSection('Pending',pending,list,false)}${renderSection('Blocked',blocked,list,false)}${done.length?renderSection('Done',done,list,done.length>4):''}</div>`:`<div class="empty"><strong>No tasks yet.</strong>Add your first task above to start tracking this list.</div>`}<div class="toast ${esc(toastKind)}">${esc(toast)}</div></div></div>`;}
function renderSection(label,items,list,collapsed){if(!items.length)return'';const body=`<div class="task-list">${items.map(item=>renderTask(list,item)).join('')}</div>`;return collapsed?`<details class="section"><summary class="section-head"><span>${esc(label)}</span><span class="section-count">${items.length}</span></summary>${body}</details>`:`<div class="section"><div class="section-head"><span>${esc(label)}</span><span class="section-count">${items.length}</span></div>${body}</div>`;}
function renderTask(list,item){const done=isDone(item),blocked=item.status==='blocked',dropped=item.status==='dropped',next=done?'pending':'done',row=done||dropped?'done':blocked?'blocked':'';return`<div class="task ${row}"><button class="check ${done?'done':''}" title="${done?'Reopen task':'Mark done'}" onclick="toggleTask('${esc(list.list_id)}','${esc(item.item_id)}','${next}')" ${busy||list.status==='archived'?'disabled':''}>${done?'✓':''}</button><div><div class="task-title ${done?'done':''}">${esc(item.title)}</div>${item.notes?`<div class="notes">${esc(item.notes)}</div>`:''}<div class="task-sub"><span class="tag status-${esc(item.status)}">${esc(prettyStatus(item.status))}</span><span class="tag">${esc(item.priority)}</span>${item.proof?.length?`<span class="tag">${item.proof.length} proof</span>`:''}</div></div><div class="task-actions">${!done&&!dropped?`<button class="primary" onclick="toggleTask('${esc(list.list_id)}','${esc(item.item_id)}','done')" ${busy||list.status==='archived'?'disabled':''}>Done</button>`:`<button class="ghost" onclick="toggleTask('${esc(list.list_id)}','${esc(item.item_id)}','pending')" ${busy||list.status==='archived'?'disabled':''}>Reopen</button>`}${!blocked&&!done&&!dropped?`<button class="ghost" onclick="blockTask('${esc(list.list_id)}','${esc(item.item_id)}')" ${busy||list.status==='archived'?'disabled':''}>Block</button>`:''}${!dropped?`<button class="ghost" onclick="addProofPrompt('${esc(list.list_id)}','${esc(item.item_id)}')" ${busy||list.status==='archived'?'disabled':''}>Proof</button>`:''}</div></div>`;}
function renderLists(lists){const all=lists||[],visible=all.slice(0,listLimit),remaining=Math.max(0,all.length-visible.length);return`<div class="card">${header(current.query?'Search results':'Your lists',current.message)}<div class="body">${visible.length?`<div class="list-grid">${visible.map(list=>`<div class="list-card"><div class="list-title">${esc(list.title)}</div><div class="list-meta">${esc(list.project)} • ${esc(list.status)} • ${esc(formatDate(list.updated_at))}</div><div class="list-stats"><div class="mini-stat"><strong>${list.pending_count}</strong><span>Pending</span></div><div class="mini-stat"><strong>${list.done_count}</strong><span>Done</span></div><div class="mini-stat"><strong>${list.blocked_count}</strong><span>Blocked</span></div></div><div class="actions" style="justify-content:flex-start;position:static"><button class="primary" onclick="openList('${esc(list.list_id)}')" ${busy?'disabled':''}>Open</button></div></div>`).join('')}</div>${remaining?`<button class="ghost show-more" onclick="listLimit += 5; render()">Show ${remaining>5?5:remaining} more</button>`:''}`:`<div class="empty"><strong>No lists found.</strong>Create your first SharvaTask list to start building history.</div>`}<div class="toast ${esc(toastKind)}">${esc(toast)}</div></div></div>`;}
function historyCopy(event){const p=event?.payload||{},a=event?.action||'';if(a==='list_created')return{title:'List created',detail:`${p.title||'Untitled'}${p.project?' • '+p.project:''}`};if(a==='task_added')return{title:'Task added',detail:`${p.title||p.item_id||'Task'}${p.priority?' • '+p.priority:''}`};if(a==='task_updated')return{title:'Task edited',detail:`${p.title||p.item_id||'Task'}${p.priority?' • '+p.priority:''}`};if(a==='task_status_updated')return{title:'Status changed',detail:`${p.status||'updated'}${p.notes?' • '+p.notes:''}`};if(a==='task_proof_added')return{title:'Proof added',detail:`${p.proof||'Proof note added'}`};if(a==='list_archived')return{title:'List archived',detail:`${p.reason||'Archived'}`};return{title:prettyStatus(a),detail:JSON.stringify(p)};}
function renderHistory(list,events){let content='';if(current.history_loading)content=`<div class="empty"><strong>Loading history…</strong>Fetching business events from the backend.</div>`;else if(current.history_events_missing)content=`<div class="empty"><strong>History response missing events.</strong>Retry history or refresh the board.</div>`;else if(Array.isArray(events)&&events.length)content=events.slice().reverse().map(event=>{const copy=historyCopy(event);return`<div class="event"><div class="event-action">${esc(copy.title)}</div><div class="event-sub">${esc(formatDate(event.event_time))} • ${esc(copy.detail)}</div><details class="raw-event"><summary>Raw event</summary><div class="event-json">${esc(JSON.stringify(event.payload,null,2))}</div></details></div>`}).join('');else content=`<div class="empty"><strong>No business events yet.</strong>This list has no recorded create, task, proof, status, or archive events.</div>`;return`<div class="card">${header('History - '+(list?.title||'List'),current.message,list)}<div class="body"><div class="actions" style="justify-content:flex-start;position:static;margin-bottom:9px"><button class="ghost" onclick="refreshBoard('${esc(list?.list_id||'')}')" ${busy||!list?.list_id?'disabled':''}>Back to board</button><button class="ghost" onclick="enterHistory('${esc(list?.list_id||'')}')" ${busy||!list?.list_id?'disabled':''}>Reload history</button></div><div class="history">${content}</div><div class="toast ${esc(toastKind)}">${esc(toast)}</div></div></div>`;}
function renderMessage(){return`<div class="card">${header('SharvaTask',current.message)}<div class="body"><div class="empty"><strong>SharvaTask</strong>${esc(current.message)}</div><div class="toast ${esc(toastKind)}">${esc(toast)}</div></div></div>`;}
function render(){if(current.view==='list'&&current.list)root.innerHTML=renderList(current.list);else if(current.view==='lists')root.innerHTML=renderLists(current.lists||[]);else if(current.view==='history')root.innerHTML=renderHistory(current.list,current.events||[]);else root.innerHTML=renderMessage();updateComposerState();window.openai?.notifyIntrinsicHeight?.();}
window.updateComposerState=function(){const input=document.getElementById('newTaskTitle'),button=document.getElementById('addTaskButton');if(button&&input)button.disabled=busy||!input.value.trim();}
window.addTask=function(listId){const title=document.getElementById('newTaskTitle')?.value?.trim();const priority=document.getElementById('newTaskPriority')?.value||'P1';if(!title){setToast('Enter a task title first.','error');render();return;}callTool('add_task',{list_id_or_query:listId,title,priority});}
window.toggleTask=function(listId,itemId,status){callTool('update_task_status',{list_id_or_query:listId,item_id_or_title:itemId,status});}
window.blockTask=function(listId,itemId){callTool('update_task_status',{list_id_or_query:listId,item_id_or_title:itemId,status:'blocked'});}
window.refreshBoard=function(listId){callTool('refresh_board_state',{list_id_or_query:listId});}
window.openList=function(listId){callTool('get_board_snapshot',{list_id_or_query:listId});}
window.addProofPrompt=function(listId,itemId){const proof=prompt('Add proof note or link');if(proof===null)return;const trimmed=proof.trim();if(!trimmed){setToast('Proof cannot be empty.','error');render();return;}callTool('add_proof',{list_id_or_query:listId,item_id_or_title:itemId,proof:trimmed});}
window.enterHistory=function(listId){current={...current,view:'history',history_loading:true,history_events_missing:false,events:Array.isArray(current.events)?current.events:[]};callTool('get_history',{list_id_or_query:listId});}
window.archiveList=function(listId){if(confirm('Archive this list? History will stay saved.'))callTool('archive_list',{list_id_or_query:listId,reason:'Archived from SharvaTask widget'});}
render();
</script>
</body>
</html>
