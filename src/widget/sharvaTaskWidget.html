<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>SharvaTask</title>
<style>
:root{color-scheme:light;--ink:#1f1b17;--muted:#746d65;--line:rgba(150,132,112,.28);--brand:#8b5cf6;--ok:#15803d;--bad:#b91c1c;--warn:#b45309;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}*{box-sizing:border-box}body{margin:0;background:transparent;color:var(--ink)}.shell{max-width:900px;margin:auto;padding:8px}.card{background:linear-gradient(180deg,rgba(255,255,255,.94),rgba(247,242,235,.88));border:1px solid rgba(255,255,255,.7);border-radius:22px;overflow:hidden;box-shadow:0 10px 28px rgba(15,16,20,.08);backdrop-filter:blur(18px)}.head{padding:14px 16px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.42)}.top{display:flex;gap:12px;justify-content:space-between;align-items:flex-start}.brand{font-size:10px;font-weight:900;letter-spacing:.13em;text-transform:uppercase;color:var(--brand)}h1{font-size:21px;line-height:1.12;margin:3px 0 0;letter-spacing:-.03em;overflow-wrap:anywhere}.sub{margin-top:6px;color:var(--muted);font-size:12px;line-height:1.35}.sync,.diag,.counts,.actions,.task-sub{display:flex;flex-wrap:wrap;gap:6px;align-items:center}.sync,.diag{margin-top:8px;font-size:11px;font-weight:750;color:var(--muted)}.diag{color:var(--brand)}.pill,.tag{border:1px solid var(--line);background:rgba(255,255,255,.55);border-radius:999px;padding:3px 7px;white-space:nowrap}.fresh{color:var(--ok)}.stale,.error,.conflict,.tool_error,.no_calltool{color:var(--bad)}.refresh_clicked,.history_clicked,.calling{color:var(--brand)}.actions{justify-content:flex-end}button,input,select{font:inherit}button{border:1px solid rgba(255,255,255,.7);background:rgba(255,255,255,.72);border-radius:999px;padding:8px 11px;cursor:pointer;font-size:12px;font-weight:760;color:var(--ink)}button.primary{background:linear-gradient(180deg,#9c74ff,#8b5cf6);color:#fff}button.danger{color:var(--bad)}button:disabled{opacity:.55;cursor:not-allowed}.body{padding:12px 14px}.composer{padding:8px;margin-bottom:10px;border:1px solid rgba(255,255,255,.55);border-radius:16px;background:rgba(255,255,255,.35)}.add-row{display:grid;grid-template-columns:1fr 72px auto;gap:7px}input,select{border:1px solid rgba(255,255,255,.7);border-radius:999px;padding:10px 12px;background:rgba(255,255,255,.72);min-width:0}.counts{margin-top:10px}.count{font-size:12px;color:var(--muted)}.count strong{font-size:15px;color:var(--ink);margin-right:4px}.section{border:1px solid rgba(255,255,255,.45);border-radius:16px;overflow:hidden;margin-top:8px;background:rgba(255,255,255,.24)}.section-head{display:flex;justify-content:space-between;padding:8px 10px;font-size:12px;font-weight:850;border-bottom:1px solid var(--line)}.tasks{display:flex;flex-direction:column;gap:7px;padding:8px}.task{display:grid;grid-template-columns:auto 1fr auto;gap:9px;padding:10px;border:1px solid rgba(255,255,255,.6);border-radius:14px;background:rgba(255,255,255,.72)}.task.done{opacity:.82}.task.blocked{background:rgba(255,247,232,.8)}.check{width:25px;height:25px;border-radius:9px;padding:0;color:var(--brand);font-weight:950}.title{font-weight:850;font-size:14px}.done .title{text-decoration:line-through;color:var(--muted)}.notes{color:var(--muted);font-size:11px;margin-top:4px}.task-sub{font-size:10px;margin-top:6px;color:var(--muted)}.status-done,.status-verified{color:var(--ok)}.status-blocked{color:var(--warn)}.task-actions{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end}.task-actions button{padding:6px 8px;font-size:11px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:9px}.list-card,.event{border:1px solid rgba(255,255,255,.58);background:rgba(255,255,255,.66);border-radius:15px;padding:10px}.list-title,.event-title{font-weight:900}.meta{color:var(--muted);font-size:11px;line-height:1.35;margin-top:4px}.history{display:flex;flex-direction:column;gap:8px}.raw{font-size:10px;margin-top:8px;white-space:pre-wrap;word-break:break-word;background:rgba(255,255,255,.5);border:1px solid var(--line);border-radius:10px;padding:8px;max-height:130px;overflow:auto}.empty{color:var(--muted);padding:18px 12px;text-align:center;border:1px dashed var(--line);border-radius:15px;background:rgba(255,255,255,.32);font-size:12px;line-height:1.42}.empty strong{display:block;color:var(--ink);margin-bottom:4px}.toast{margin-top:9px;min-height:16px;font-size:11px;font-weight:720;color:var(--muted)}.toast.busy{color:var(--brand)}.toast.error{color:var(--bad)}@media(max-width:640px){.shell{padding:6px}.head{padding:12px}.top{display:block;position:relative;padding-right:104px}.actions{position:absolute;top:0;right:0}.actions .txt,.brand{display:none}h1{font-size:19px}.body{padding:9px}.add-row{grid-template-columns:1fr 50px 38px}#addTaskButton{font-size:0;width:38px}#addTaskButton:before{content:'+';font-size:20px}.task{grid-template-columns:auto 1fr}.task-actions{grid-column:2;justify-content:flex-start}.grid{grid-template-columns:1fr}}
</style>
</head>
<body><div id="root" class="shell"></div>
<script>
const root=document.getElementById('root');let busy=false,listLimit=5,toast='',toastKind='';
function esc(v){return String(v??'').replace(/[&<>'"]/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[ch]));}
function obj(v){return v&&typeof v==='object'&&!Array.isArray(v)}function arr(...v){return v.find(Array.isArray)}function done(i){return i.status==='done'||i.status==='verified'}function pending(i){return i.status==='pending'||i.status==='in_progress'}function pretty(s){return String(s||'').replaceAll('_',' ')}
function nowIso(){return new Date().toISOString()}function fmt(v){if(!v)return'not synced';const d=new Date(v);return Number.isNaN(d.getTime())?String(v):d.toLocaleString(undefined,{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});}function setToast(m,k){toast=m||'';toastKind=k||'';}function markDiag(label,kind){current={...current,diag_label:label,diag_kind:kind||'info',client_received_at:nowIso()};}
function parseText(v){if(typeof v!=='string')return null;try{const p=JSON.parse(v);return obj(p)?p:null}catch{return null}}
function extractStructuredContent(r){const direct=r?.structuredContent||r?.mcp_tool_result?.structuredContent||r?.call_tool_result?.structuredContent||r?.toolResult?.structuredContent||r?.result?.structuredContent||r?.data?.structuredContent;if(direct)return direct;const c=Array.isArray(r?.content)?r.content:[];return c.find(i=>i?.structuredContent)?.structuredContent||c.find(i=>i?.type==='structuredContent')?.structuredContent||c.find(i=>obj(i?.json))?.json||c.map(i=>parseText(i?.text)).find(Boolean)||(r?.response_type||r?.view||r?.board_snapshot||r?.history||r?.events?r:null);}
function boardOf(o,s){return obj(o?.board)?o.board:obj(s?.board)?s.board:null}function listOf(o,p,b){return o?.list||b?.list||o?.board_snapshot?.list||p?.list||null}function listsOf(o,p,s){return arr(o?.lists,s?.lists,o?.list_browser?.lists,o?.results?.lists,p?.lists)||[]}function eventsOf(o,b,s){return arr(o?.events,o?.history?.events,o?.history_events,o?.business_events,s?.events,s?.history?.events,s?.recent_events,b?.events,b?.recent_events)}
function hasEvents(o,b,s){return Array.isArray(o?.events)||Array.isArray(o?.history?.events)||Array.isArray(o?.history_events)||Array.isArray(o?.business_events)||Array.isArray(s?.events)||Array.isArray(s?.history?.events)||Array.isArray(s?.recent_events)||Array.isArray(b?.events)||Array.isArray(b?.recent_events)}
function modeFromOutput(o,p,source){if(source==='get_history'||o?.response_type==='history'||o?.mode_recommendation==='history'||o?.view==='history'||o?.mode==='history')return'history';if(source==='browse_lists'||source==='search_board'||o?.response_type==='list_browser'||o?.response_type==='search_results'||o?.mode_recommendation==='list_browser'||o?.mode_recommendation==='ambiguity_resolution')return'lists';if(o?.view)return o.view;if(o?.mode)return o.mode;if(o?.board_snapshot?.board?.list||o?.board?.list||o?.list)return'list';return p?.mode||p?.view||'message'}
function syncMeta(o,p,s,b,source){const received=nowIso();return{sync_status:o?.sync_status||s?.sync_status||o?.status||p?.sync_status||'fresh',server_time:o?.server_time||o?.serverTime||o?.server_timestamp||s?.server_time||s?.snapshot_created_at||s?.updated_at||b?.server_time||b?.snapshot_created_at||b?.updated_at||received,client_received_at:received,last_sync_source:source,state_version:o?.state_version_after??o?.state_version??s?.state_version_after??s?.state_version??b?.state_version??p?.state_version??p?.state_version_after}}
function normalizeOutputToViewState(o,p,source){if(!obj(o))return{...(p||{}),view:p?.view||'message',mode:p?.mode||p?.view||'message',message:p?.message||'No SharvaTask data received yet.',output_shape_error:true};const snap=obj(o.board_snapshot)?o.board_snapshot:obj(o.snapshot)?o.snapshot:null,b=boardOf(o,snap),list=listOf(o,p,b),lists=listsOf(o,p,snap),ev=eventsOf(o,b,snap),evPresent=hasEvents(o,b,snap),mode=modeFromOutput(o,p,source),sync=syncMeta(o,p||{},snap,b,source);const next={...(p||{}),...o,view:mode,mode,message:o.message||o.summary||p?.message||'SharvaTask state ready.',list,lists,events:mode==='history'?(ev||[]):(Array.isArray(o.events)?o.events:p?.events||[]),history_events_missing:mode==='history'&&!evPresent&&!o.error_code,history_loading:false,sync_status:sync.sync_status,server_time:sync.server_time,client_received_at:sync.client_received_at,last_sync_source:sync.last_sync_source,state_version:sync.state_version,board_snapshot:snap||p?.board_snapshot,response_type:o.response_type||p?.response_type,diag_label:`${source} result received`,diag_kind:'result'};if(source==='get_history'){next.view='history';next.mode='history';next.history_response_received=true;next.history_events_missing=!evPresent&&!o.error_code}return next}
function applyToolOutput(result,source){const output=extractStructuredContent(result);if(!output){current={...current,server_time:nowIso(),client_received_at:nowIso(),last_sync_source:source,history_loading:false,diag_label:`${source} returned no structuredContent`,diag_kind:'tool_error'};if(source==='get_history')current={...current,view:'history',mode:'history',history_events_missing:true,history_response_received:true};setToast('Tool returned no structured state. Showing visible fallback.','error');render();return false}current=normalizeOutputToViewState(output,current,source);if(source==='get_history')current={...current,view:'history',mode:'history',history_loading:false};if(current.error_code)setToast(current.message||`SharvaTask error: ${current.error_code}`,'error');else if(source==='refresh_board_state')setToast('Synced from backend ✅','');else if(source==='get_history')setToast('History loaded ✅','');else setToast('Updated successfully ✅','');render();return true}
let current=normalizeOutputToViewState(window.openai?.toolOutput||{view:'message',mode:'message',message:'No SharvaTask data received yet.',diag_label:'widget booted',diag_kind:'boot'},null,'initial');window.addEventListener('openai:set_globals',()=>{current=normalizeOutputToViewState(window.openai?.toolOutput||current,current,'set_globals');render()});
function syncLine(){const st=current.sync_status||'fresh',v=current.state_version??current.state_version_after??'—',t=current.server_time||current.client_received_at;return`<span class="pill ${esc(st)}">${esc(pretty(st))}</span><span class="pill">v${esc(v)}</span><span class="pill">server ${esc(fmt(t))}</span>`}
function diagLine(){return`<span class="pill ${esc(current.diag_kind||'info')}">diag: ${esc(current.diag_label||'idle')}</span><span class="pill">client ${esc(fmt(current.client_received_at))}</span>`}
async function callTool(name,args){if(!window.openai?.callTool){current={...current,sync_status:'no_calltool',server_time:nowIso(),client_received_at:nowIso(),diag_label:`${name} blocked: window.openai.callTool unavailable`,diag_kind:'no_calltool',history_loading:false};if(name==='get_history')current={...current,view:'history',mode:'history',history_events_missing:true};setToast('window.openai.callTool is unavailable in this widget.','error');render();return false}busy=true;current={...current,diag_label:`calling ${name}`,diag_kind:'calling',client_received_at:nowIso()};setToast(name==='refresh_board_state'?'Refreshing…':name==='get_history'?'Loading history…':'Working…','busy');render();try{return applyToolOutput(await window.openai.callTool(name,args||{}),name)}catch(e){current={...current,sync_status:'tool_error',server_time:nowIso(),client_received_at:nowIso(),diag_label:`${name} failed: ${e?.message||e}`,diag_kind:'tool_error',history_loading:false};if(name==='get_history')current={...current,view:'history',mode:'history',history_events_missing:true};setToast('Tool call failed: '+(e?.message||e),'error');render();return false}finally{busy=false;render()}}
function counts(list){const it=list?.items||list?.tasks||[];return{pending:it.filter(pending).length,blocked:it.filter(i=>i.status==='blocked').length,done:it.filter(done).length,total:it.length}}
function header(title,sub,list){const c=list?counts(list):null,show=sub&&!String(sub).startsWith('Board snapshot ready:');return`<div class="head"><div class="top"><div><div class="brand">SharvaTask</div><h1>${esc(title)}</h1>${show?`<div class="sub">${esc(sub)}</div>`:''}<div class="sync">${syncLine()}</div><div class="diag">${diagLine()}</div></div>${list?`<div class="actions"><button aria-label="History" data-action="history" data-list-id="${esc(list.list_id)}" ${busy?'disabled':''}>◷ <span class="txt">History</span></button><button aria-label="Refresh" data-action="refresh" data-list-id="${esc(list.list_id)}" ${busy?'disabled':''}>↻ <span class="txt">Refresh</span></button><button class="danger" aria-label="Archive" data-action="archive" data-list-id="${esc(list.list_id)}" ${busy||list.status==='archived'?'disabled':''}>⌫ <span class="txt">Archive</span></button></div>`:''}</div>${list?`<div class="counts"><span class="pill count"><strong>${c.pending}</strong>Pending</span><span class="pill count"><strong>${c.done}</strong>Done</span><span class="pill count"><strong>${c.blocked}</strong>Blocked</span></div>`:''}</div>`}
function items(list){return list?.items||list?.tasks||[]}function itemId(i){return i.item_id||i.task_id||i.id||''}
function renderList(list){const it=items(list),pend=it.filter(pending),block=it.filter(i=>i.status==='blocked'),dn=it.filter(i=>done(i)||i.status==='dropped');return`<div class="card">${header(list.title,current.message,list)}<div class="body">${list.status!=='archived'?`<div class="composer"><div class="add-row"><input id="newTaskTitle" placeholder="Add a task…" /><select id="newTaskPriority"><option>P1</option><option>P0</option><option>P2</option><option>P3</option></select><button id="addTaskButton" class="primary" data-action="add-task" data-list-id="${esc(list.list_id)}" ${busy?'disabled':''}>Add</button></div></div>`:''}${it.length?`${section('Pending',pend,list)}${section('Blocked',block,list)}${section('Done',dn,list)}`:`<div class="empty"><strong>No tasks yet.</strong>Add your first task above to start tracking this list.</div>`}<div class="toast ${esc(toastKind)}">${esc(toast)}</div></div></div>`}
function section(label,it,list){if(!it.length)return'';return`<div class="section"><div class="section-head"><span>${esc(label)}</span><span>${it.length}</span></div><div class="tasks">${it.map(i=>task(list,i)).join('')}</div></div>`}
function task(list,i){const d=done(i),b=i.status==='blocked',drop=i.status==='dropped',next=d?'pending':'done',id=itemId(i);return`<div class="task ${d||drop?'done':b?'blocked':''}"><button class="check" data-action="status" data-list-id="${esc(list.list_id)}" data-item-id="${esc(id)}" data-status="${esc(next)}" ${busy||list.status==='archived'?'disabled':''}>${d?'✓':''}</button><div><div class="title">${esc(i.title)}</div>${i.notes?`<div class="notes">${esc(i.notes)}</div>`:''}<div class="task-sub"><span class="tag status-${esc(i.status)}">${esc(pretty(i.status))}</span><span class="tag">${esc(i.priority)}</span>${i.proof?.length?`<span class="tag">${i.proof.length} proof</span>`:''}</div></div><div class="task-actions">${!d&&!drop?`<button class="primary" data-action="status" data-list-id="${esc(list.list_id)}" data-item-id="${esc(id)}" data-status="done" ${busy||list.status==='archived'?'disabled':''}>Done</button>`:`<button data-action="status" data-list-id="${esc(list.list_id)}" data-item-id="${esc(id)}" data-status="pending" ${busy||list.status==='archived'?'disabled':''}>Reopen</button>`}${!b&&!d&&!drop?`<button data-action="status" data-list-id="${esc(list.list_id)}" data-item-id="${esc(id)}" data-status="blocked" ${busy||list.status==='archived'?'disabled':''}>Block</button>`:''}${!drop?`<button data-action="proof" data-list-id="${esc(list.list_id)}" data-item-id="${esc(id)}" ${busy||list.status==='archived'?'disabled':''}>Proof</button>`:''}</div></div>`}
function renderLists(lists){const all=lists||[],vis=all.slice(0,listLimit),rem=Math.max(0,all.length-vis.length);return`<div class="card">${header(current.query?'Search results':'Your lists',current.message)}<div class="body">${vis.length?`<div class="grid">${vis.map(l=>`<div class="list-card"><div class="list-title">${esc(l.title)}</div><div class="meta">${esc(l.project||'SharvaTask')} • ${esc(l.status)} • ${esc(fmt(l.updated_at||l.last_mutation_at))}</div><div class="counts"><span class="pill count"><strong>${l.pending_count??0}</strong>Pending</span><span class="pill count"><strong>${l.done_count??0}</strong>Done</span><span class="pill count"><strong>${l.blocked_count??0}</strong>Blocked</span></div><button class="primary" data-action="open-list" data-list-id="${esc(l.list_id)}" ${busy?'disabled':''}>Open</button></div>`).join('')}</div>${rem?`<button data-action="show-more">Show ${rem>5?5:rem} more</button>`:''}`:`<div class="empty"><strong>No lists found.</strong>Create your first SharvaTask list to start building history.</div>`}<div class="toast ${esc(toastKind)}">${esc(toast)}</div></div></div>`}
function historyCopy(e){const p=e?.payload||e?.after||{},a=e?.action||e?.event_type||'';if(a==='list_created'||a==='list.created')return{t:'List created',d:p.title||'Untitled'};if(a==='task_added'||a==='task.created')return{t:'Task added',d:p.title||p.item_id||p.task_id||'Task'};if(a==='task_updated'||a==='task.updated')return{t:'Task edited',d:p.title||p.item_id||p.task_id||'Task'};if(a==='task_status_updated'||a==='task.status_changed')return{t:'Status changed',d:p.status||'updated'};if(a==='task_proof_added'||a==='proof.added')return{t:'Proof added',d:p.proof||p.content||'Proof note added'};if(a==='list_archived'||a==='list.archived')return{t:'List archived',d:p.reason||'Archived'};return{t:pretty(a||'event'),d:JSON.stringify(p)}}
function renderHistory(list,events){let content='';if(current.history_loading)content=`<div class="empty"><strong>Loading history…</strong>Click handler fired. Waiting for get_history response.</div>`;else if(current.history_events_missing)content=`<div class="empty"><strong>History response received but no events field was returned</strong>The click/render chain ran. Reload history or refresh the board.</div>`;else if(Array.isArray(events)&&events.length)content=events.slice().reverse().map(e=>{const c=historyCopy(e);return`<div class="event"><div class="event-title">${esc(c.t)}</div><div class="meta">${esc(fmt(e.event_time||e.created_at))} • ${esc(c.d)}</div><details><summary>Raw event</summary><div class="raw">${esc(JSON.stringify(e.payload||e,null,2))}</div></details></div>`}).join('');else content=`<div class="empty"><strong>No business events yet.</strong>History mode is open, but the backend returned an empty events array.</div>`;return`<div class="card">${header('History - '+(list?.title||'List'),current.message,list)}<div class="body"><div class="actions" style="justify-content:flex-start;position:static;margin-bottom:9px"><button data-action="refresh" data-list-id="${esc(list?.list_id||'')}" ${busy||!list?.list_id?'disabled':''}>Back to board</button><button data-action="history" data-list-id="${esc(list?.list_id||'')}" ${busy||!list?.list_id?'disabled':''}>Reload history</button></div><div class="history">${content}</div><div class="toast ${esc(toastKind)}">${esc(toast)}</div></div></div>`}
function renderMessage(){return`<div class="card">${header('SharvaTask',current.message)}<div class="body"><div class="empty"><strong>SharvaTask</strong>${esc(current.message)}</div><div class="toast ${esc(toastKind)}">${esc(toast)}</div></div></div>`}
function isHistoryMode(){return current.view==='history'||current.mode==='history'}function render(){if(isHistoryMode())root.innerHTML=renderHistory(current.list,current.events||[]);else if((current.view==='list'||current.mode==='list')&&current.list)root.innerHTML=renderList(current.list);else if(current.view==='lists'||current.mode==='lists')root.innerHTML=renderLists(current.lists||[]);else root.innerHTML=renderMessage();updateComposerState();window.openai?.notifyIntrinsicHeight?.()}
function updateComposerState(){const i=document.getElementById('newTaskTitle'),b=document.getElementById('addTaskButton');if(b&&i)b.disabled=busy||!i.value.trim()}
function addTask(listId){const title=document.getElementById('newTaskTitle')?.value?.trim(),priority=document.getElementById('newTaskPriority')?.value||'P1';if(!title){setToast('Enter a task title first.','error');render();return}callTool('add_task',{list_id_or_query:listId,title,priority})}
function refreshBoard(listId){const t=nowIso();current={...current,sync_status:'refresh_clicked',server_time:t,client_received_at:t,last_sync_source:'refresh_click',diag_label:'Refresh click handler fired',diag_kind:'refresh_clicked'};setToast('Refresh click received. Calling backend…','busy');render();callTool('refresh_board_state',{list_id_or_query:listId})}
function enterHistory(listId){const t=nowIso();current={...current,view:'history',mode:'history',sync_status:'history_clicked',server_time:t,client_received_at:t,last_sync_source:'history_click',diag_label:'History click handler fired',diag_kind:'history_clicked',history_loading:true,history_events_missing:false,history_response_received:false,events:Array.isArray(current.events)?current.events:[]};setToast('History click received. Calling backend…','busy');render();callTool('get_history',{list_id_or_query:listId})}
function handleAction(el){const a=el.dataset.action,listId=el.dataset.listId,itemId=el.dataset.itemId,status=el.dataset.status;if(a==='refresh')return refreshBoard(listId);if(a==='history')return enterHistory(listId);if(a==='add-task')return addTask(listId);if(a==='status')return callTool('update_task_status',{list_id_or_query:listId,item_id_or_title:itemId,status});if(a==='proof'){const proof=prompt('Add proof note or link');if(proof===null)return;const trimmed=proof.trim();if(!trimmed){setToast('Proof cannot be empty.','error');render();return}return callTool('add_proof',{list_id_or_query:listId,item_id_or_title:itemId,proof:trimmed})}if(a==='archive'){if(confirm('Archive this list? History will stay saved.'))return callTool('archive_list',{list_id_or_query:listId,reason:'Archived from SharvaTask widget'})}if(a==='open-list')return callTool('get_board_snapshot',{list_id_or_query:listId});if(a==='show-more'){listLimit+=5;render()}}
root.addEventListener('click',event=>{const el=event.target.closest('[data-action]');if(!el||!root.contains(el))return;event.preventDefault();markDiag(`DOM click captured: ${el.dataset.action}`,'click');render();handleAction(el);});
root.addEventListener('input',event=>{if(event.target?.id==='newTaskTitle')updateComposerState();});
root.addEventListener('keydown',event=>{if(event.target?.id==='newTaskTitle'&&event.key==='Enter'){event.preventDefault();const listId=event.target.closest('.card')?.querySelector('[data-action="add-task"]')?.dataset.listId;if(listId)addTask(listId);}});
render();
</script></body></html>
